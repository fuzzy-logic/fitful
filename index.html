  const CORR_MIN_DAYS = 10;   // min usable days for a continuous/time chart or r value
  const CORR_MIN_SPLIT = 3;   // min days in each side of a with/without comparison
  let corrSel = (function () {
    let s = {};
    try { s = JSON.parse(localStorage.getItem("fitful.corrSel")) || {}; } catch (e) { s = {}; }
    if (s.target !== "symptoms") s.target = "fits";
    if (!s.dim) s.dim = "temp";
    return s;
  })();
  function saveCorrSel() { try { localStorage.setItem("fitful.corrSel", JSON.stringify(corrSel)); } catch (e) {} }
  function avgOf(arr) { return arr.length ? arr.reduce(function (a, b) { return a + b; }, 0) / arr.length : 0; }

  function pearson(xs, ys) {
    const n = xs.length;
    if (n < 3) return null;
    let sx = 0, sy = 0, sxx = 0, syy = 0, sxy = 0;
    for (let i = 0; i < n; i++) { const x = xs[i], y = ys[i]; sx += x; sy += y; sxx += x * x; syy += y * y; sxy += x * y; }
    const cov = n * sxy - sx * sy;
    const dx = Math.sqrt(n * sxx - sx * sx), dy = Math.sqrt(n * syy - sy * sy);
    if (dx === 0 || dy === 0) return null;
    return cov / (dx * dy);
  }
  function corrStrengthLabel(r) {
    if (r == null) return "";
    const a = Math.abs(r);
    const s = a < 0.2 ? "very weak" : a < 0.4 ? "weak" : a < 0.6 ? "moderate" : a < 0.8 ? "strong" : "very strong";
    return s + " " + (r >= 0 ? "positive" : "negative");
  }
  function binValues(pairs, nBins) {
    if (!pairs.length) return [];
    const xs = pairs.map(function (p) { return p.x; });
    const min = Math.min.apply(null, xs), max = Math.max.apply(null, xs);
    if (max === min) return [{ label: Math.round(min) + "", value: avgOf(pairs.map(function (p) { return p.y; })), n: pairs.length }];
    const w = (max - min) / nBins, out = [];
    for (let b = 0; b < nBins; b++) {
      const lo = min + b * w, hiEdge = min + (b + 1) * w, hi = b === nBins - 1 ? max + 1e-9 : hiEdge;
      const ys = pairs.filter(function (p) { return p.x >= lo && p.x < hi; }).map(function (p) { return p.y; });
      out.push({ label: Math.round(lo) + "–" + Math.round(hiEdge), value: ys.length ? avgOf(ys) : 0, n: ys.length });
    }
    return out;
  }

  // Window = data span capped at 90 days (max single Open-Meteo call).
  function corrWindowDays() {
    const list = active();
    if (!list.length) return 0;
    const earliest = Math.min.apply(null, list.map(function (f) { return f.ts; }));
    const days = Math.ceil((Date.now() - startOfDay(earliest)) / 86400000) + 1;
    return Math.min(90, Math.max(1, days));
  }
  // Per-day buckets over the window, newest last; includes zero-activity days.
  function dayTotals(list, useCount, nDays) {
    const today = startOfDay(Date.now()), out = [];
    for (let i = nDays - 1; i >= 0; i--) {
      const dayTs = today - i * 86400000;
      const sameDay = list.filter(function (f) { return startOfDay(f.ts) === dayTs; });
      out.push({ dayTs: dayTs, dateStr: localDateStr(dayTs), total: useCount ? sumCount(sameDay) : sameDay.length, fits: sameDay });
    }
    return out;
  }
  // Active fits with extreme-count outliers removed (respects the outlier toggle).
  function cleanFitsActive() {
    const fl = fitsActive();
    const fence = outlierFence(fl.map(fitCount));
    if (!fence) return fl;
    return fl.filter(function (f) { const c = fitCount(f); return c >= fence.lo && c <= fence.hi; });
  }
  function corrTargetList(target) { return target === "symptoms" ? symptomsActive() : cleanFitsActive(); }
  function corrUnit(target) { return target === "symptoms" ? "episodes" : "fits"; }

  // Home-base location = mode of rounded fit lat/lng. Used only for the daily-temp backfill.
  function homeBaseLatLng() {
    const m = {};
    active().forEach(function (f) {
      if (f.lat == null || f.lng == null) return;
      const k = f.lat.toFixed(2) + "," + f.lng.toFixed(2);
      m[k] = (m[k] || 0) + 1;
    });
    let best = null, bestN = 0;
    Object.keys(m).forEach(function (k) { if (m[k] > bestN) { bestN = m[k]; best = k; } });
    if (!best) return null;
    const p = best.split(",");
    return { lat: +p[0], lng: +p[1] };
  }
  // Daily mean temps for the window in ONE call. Open-Meteo forecast endpoint supports
  // past_days up to 92, covering the whole window incl. zero-fit days.
  function fetchDayTemps(lat, lng, nDays) {
    const past = Math.min(92, Math.max(1, nDays));
    const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat.toFixed(4) + "&longitude=" + lng.toFixed(4) +
      "&daily=temperature_2m_mean&past_days=" + past + "&forecast_days=1&timezone=auto";
    return fetch(url).then(function (r) { return r.ok ? r.json() : null; }).then(function (j) {
      if (!j || !j.daily || !j.daily.time) return null;
      const map = {};
      j.daily.time.forEach(function (d, i) { const t = j.daily.temperature_2m_mean[i]; if (t != null) map[d] = +(+t).toFixed(1); });
      return map;
    }).catch(function () { return null; });
  }
  let dayTempsState = null, dayTempsLoaded = false, dayTempsFetching = false;
  function loadDayTemps() {
    if (!dayTempsLoaded) {
      try { dayTempsState = JSON.parse(localStorage.getItem("fitful.dayTemps")) || null; } catch (e) { dayTempsState = null; }
      dayTempsLoaded = true;
    }
    return dayTempsState;
  }
  function dayTempsFresh(needDays) {
    const s = loadDayTemps(), home = homeBaseLatLng();
    if (!s || !s.meta || !home) return false;
    return s.meta.lat === home.lat && s.meta.lng === home.lng &&
      s.meta.to === localDateStr(Date.now()) && (s.meta.days || 0) >= needDays;
  }
  function ensureDayTemps() {
    const need = corrWindowDays();
    if (!need || dayTempsFetching || dayTempsFresh(need)) return;
    const home = homeBaseLatLng();
    if (!home) return;
    dayTempsFetching = true;
    fetchDayTemps(home.lat, home.lng, need).then(function (map) {
      dayTempsFetching = false;
      if (map) {
        dayTempsState = { map: map, meta: { lat: home.lat, lng: home.lng, fetchedAt: Date.now(), to: localDateStr(Date.now()), days: need } };
        dayTempsLoaded = true;
        try { localStorage.setItem("fitful.dayTemps", JSON.stringify(dayTempsState)); } catch (e) {}
      }
      if (views.insights && views.insights.classList.contains("active") && document.getElementById("corrSection")) refreshCorr();
    });
  }

  // Dimension catalogue. Static weather/time/environment + dynamic per-tag binaries.
  function corrDims() {
    const dims = [
      { id: "temp", label: "Temperature", group: "Weather", type: "continuous" },
      { id: "feels", label: "Feels-like", group: "Weather", type: "continuous" },
      { id: "humidity", label: "Humidity", group: "Weather", type: "continuous" },
      { id: "condition", label: "Condition", group: "Weather", type: "categorical" },
      { id: "timeofday", label: "Time of day", group: "Time", type: "timeofday" },
      { id: "dayofweek", label: "Day of week", group: "Time", type: "dayofweek" },
      { id: "trend", label: "Date trend", group: "Time", type: "trend" },
      { id: "environment", label: "Environment", group: "Environment", type: "categorical" },
    ];
    const trigSet = {};
    fitsActive().forEach(function (f) { (f.triggers || []).forEach(function (t) { trigSet[t] = 1; }); });
    Object.keys(trigSet).sort().forEach(function (t) { dims.push({ id: "trig:" + t, label: t, group: "Tags", type: "binary", tag: { kind: "trigger", key: t } }); });
    MOTOR_FLAGS.forEach(function (mf) { dims.push({ id: "motor:" + mf.key, label: mf.label, group: "Tags", type: "binary", tag: { kind: "motor", key: mf.key } }); });
    dims.push({ id: "speech", label: "Speech affected", group: "Tags", type: "binary", tag: { kind: "speech" } });
    return dims;
  }
  function dayHasTag(d, tag) {
    return d.fits.some(function (f) {
      if (tag.kind === "trigger") return (f.triggers || []).indexOf(tag.key) >= 0;
      if (tag.kind === "motor") return !!f[tag.key];
      if (tag.kind === "speech") return f.speech && f.speech !== "normal";
      return false;
    });
  }

  const corrCaption = '<div class="corr-cap">Association, not causation — patterns can be coincidental.</div>';
  function corrNote(msg) { return '<div class="corr-empty">' + esc(msg) + "</div>"; }
  function corrMeta(r, n, unit) {
    let s = '<div class="corr-meta">';
    if (r != null) s += '<span class="corr-r">r = ' + r.toFixed(2) + "</span> <span>" + corrStrengthLabel(r) + "</span> · ";
    s += "<span>" + n + " " + (unit || "days") + "</span></div>";
    return s;
  }

  function renderCorrChart(dimId, target) {
    const dims = corrDims();
    let dim = null;
    dims.forEach(function (d) { if (d.id === dimId) dim = d; });
    if (!dim) dim = dims[0];
    const useCount = target !== "symptoms";
    const list = corrTargetList(target);
    const nDays = corrWindowDays();
    const unit = corrUnit(target);

    if (dim.type === "continuous") {
      const totals = dayTotals(list, useCount, nDays), pairs = [];
      if (dim.id === "temp") {
        const s = loadDayTemps();
        if (!s || !s.map) return corrNote(homeBaseLatLng() ? "Loading temperatures…" : "Needs location data to backfill temperatures.") + corrCaption;
        totals.forEach(function (d) { const x = s.map[d.dateStr]; if (x != null) pairs.push({ x: x, y: d.total }); });
      } else {
        const field = dim.id === "feels" ? "apparentC" : "humidity";
        totals.forEach(function (d) {
          const vals = d.fits.map(function (f) { return f[field]; }).filter(function (v) { return v != null; });
          if (vals.length) pairs.push({ x: avgOf(vals), y: d.total });
        });
      }
      if (pairs.length < CORR_MIN_DAYS) return corrNote("Not enough data yet (" + pairs.length + "/" + CORR_MIN_DAYS + " days).") + corrCaption;
      const r = pearson(pairs.map(function (p) { return p.x; }), pairs.map(function (p) { return p.y; }));
      const bins = binValues(pairs, 5);
      return svgBars(bins.map(function (b) { return b.label; }), bins.map(function (b) { return +b.value.toFixed(1); }), function () { return true; }) +
        corrMeta(r, pairs.length, "days") + corrCaption;
    }

    if (dim.type === "categorical") {
      const extract = dim.id === "environment"
        ? function (f) { return f.environment ? [cap(f.environment)] : []; }
        : function (f) { return f.weatherCode != null ? [weatherLabel(f.weatherCode)] : []; };
      const rows = countBy(extract, list);
      const denom = useCount ? sumCount(list) : list.length;
      if (denom < CORR_MIN_DAYS) return corrNote("Not enough data yet.") + corrCaption;
      return hbars(rows, "No " + dim.label.toLowerCase() + " data tagged yet.", denom) + corrMeta(null, denom, unit) + corrCaption;
    }

    if (dim.type === "binary") {
      const totals = dayTotals(list, useCount, nDays);
      const activeDays = totals.filter(function (d) { return d.total > 0; });
      const withDays = activeDays.filter(function (d) { return dayHasTag(d, dim.tag); });
      const withoutDays = activeDays.filter(function (d) { return !dayHasTag(d, dim.tag); });
      if (withDays.length < CORR_MIN_SPLIT || withoutDays.length < CORR_MIN_SPLIT)
        return corrNote("Not enough data to compare (need ≥" + CORR_MIN_SPLIT + " days each side).") + corrCaption;
      const aw = avgOf(withDays.map(function (d) { return d.total; }));
      const awo = avgOf(withoutDays.map(function (d) { return d.total; }));
      const ratio = awo > 0 ? aw / awo : null;
      let eff = "";
      if (ratio != null) eff = '<div class="corr-eff">' + (ratio >= 1 ? "+" + Math.round((ratio - 1) * 100) + "% more" : "−" + Math.round((1 - ratio) * 100) + "% fewer") +
        " " + unit + "/day on “" + esc(dim.label) + "” days</div>";
      return svgBars(["With", "Without"], [+aw.toFixed(1), +awo.toFixed(1)], function () { return true; }) +
        eff + corrMeta(null, withDays.length + withoutDays.length, "days") + corrCaption;
    }

    if (dim.type === "timeofday") {
      if (list.length < CORR_MIN_DAYS) return corrNote("Not enough data yet.") + corrCaption;
      return barChartHours(list) + corrMeta(null, list.length, unit) + corrCaption;
    }

    if (dim.type === "dayofweek") {
      const totals = dayTotals(list, useCount, nDays);
      if (totals.filter(function (d) { return d.total > 0; }).length < CORR_MIN_DAYS) return corrNote("Not enough data yet.") + corrCaption;
      const sums = new Array(7).fill(0), counts = new Array(7).fill(0);
      totals.forEach(function (d) { const w = new Date(d.dayTs).getDay(); sums[w] += d.total; counts[w]++; });
      const order = [1, 2, 3, 4, 5, 6, 0], names = { 0: "Sun", 1: "Mon", 2: "Tue", 3: "Wed", 4: "Thu", 5: "Fri", 6: "Sat" };
      return svgBars(order.map(function (w) { return names[w]; }), order.map(function (w) { return counts[w] ? +(sums[w] / counts[w]).toFixed(1) : 0; }), function () { return true; }) +
        corrMeta(null, nDays, "days") + corrCaption;
    }

    if (dim.type === "trend") {
      const totals = dayTotals(list, useCount, nDays);
      if (totals.filter(function (d) { return d.total > 0; }).length < CORR_MIN_DAYS) return corrNote("Not enough data yet.") + corrCaption;
      const ys = totals.map(function (d) { return d.total; }), xs = totals.map(function (_, i) { return i; });
      const r = pearson(xs, ys), step = Math.max(1, Math.ceil(nDays / 7));
      return svgBars(totals.map(function (d) { return new Date(d.dayTs).toLocaleDateString([], { day: "numeric" }); }), ys, function (i) { return i % step === 0; }) +
        corrMeta(r, nDays, "days") + corrCaption;
    }
    return corrNote("No data.") + corrCaption;
  }

  // Auto-surface the strongest associations (above a strength + sample-size threshold).
  function notablePatterns(target) {
    const useCount = target !== "symptoms";
    const list = corrTargetList(target), nDays = corrWindowDays(), unit = corrUnit(target);
    const totals = dayTotals(list, useCount, nDays), out = [];
    const s = loadDayTemps();
    if (s && s.map) {
      const pairs = [];
      totals.forEach(function (d) { const x = s.map[d.dateStr]; if (x != null) pairs.push({ x: x, y: d.total }); });
      if (pairs.length >= CORR_MIN_DAYS) {
        const r = pearson(pairs.map(function (p) { return p.x; }), pairs.map(function (p) { return p.y; }));
        if (r != null && Math.abs(r) >= 0.4)
          out.push({ dim: "temp", text: (r > 0 ? "Warmer" : "Cooler") + " days ↔ more " + unit, meta: corrStrengthLabel(r) + ", " + pairs.length + " days", score: Math.abs(r) });
      }
    }
    if (totals.filter(function (d) { return d.total > 0; }).length >= CORR_MIN_DAYS) {
      const r = pearson(totals.map(function (_, i) { return i; }), totals.map(function (d) { return d.total; }));
      if (r != null && Math.abs(r) >= 0.4)
        out.push({ dim: "trend", text: (r > 0 ? "Increasing" : "Decreasing") + " over time", meta: corrStrengthLabel(r) + ", " + nDays + " days", score: Math.abs(r) });
    }
    corrDims().filter(function (d) { return d.type === "binary"; }).forEach(function (dim) {
      const activeDays = totals.filter(function (d) { return d.total > 0; });
      const w = activeDays.filter(function (d) { return dayHasTag(d, dim.tag); });
      const wo = activeDays.filter(function (d) { return !dayHasTag(d, dim.tag); });
      if (w.length < CORR_MIN_SPLIT || wo.length < CORR_MIN_SPLIT) return;
      const aw = avgOf(w.map(function (d) { return d.total; })), awo = avgOf(wo.map(function (d) { return d.total; }));
      const ratio = awo > 0 ? aw / awo : null;
      if (ratio != null && (ratio >= 1.5 || ratio <= 0.66))
        out.push({ dim: dim.id, text: "“" + dim.label + "” days ↔ " + (ratio >= 1 ? "more" : "fewer") + " " + unit,
          meta: (ratio >= 1 ? "+" + Math.round((ratio - 1) * 100) : "−" + Math.round((1 - ratio) * 100)) + "%, " + (w.length + wo.length) + " days", score: Math.abs(Math.log(ratio)) });
    });
    out.sort(function (a, b) { return b.score - a.score; });
    return out.slice(0, 3);
  }

  // ---------------- Export ----------------
  function buildSummaryText() {
    const list = active();
    const sorted = list.slice().sort(function (a, b) { return a.ts - b.ts; });
    const days = new Set(list.map(function (f) { return startOfDay(f.ts); })).size;
    let out = "Fitful seizure log\n";
    out += "Total fits: " + sumCount(fitsActive()) + " over " + days + " day(s)\n";
    out += "Symptom episodes: " + symptomsActive().length + "\n";
    out += "Exported: " + new Date().toLocaleString() + "\n\n";
    let lastDay = null;
    sorted.forEach(function (f) {
      const dk = startOfDay(f.ts);
      if (dk !== lastDay) { out += "— " + new Date(f.ts).toLocaleDateString() + " —\n"; lastDay = dk; }
      const symptom = isSymptom(f);
      const parts = [fmtTime(f.ts)];
      if (symptom) parts.push("Symptoms (no fit)");
      else if (fitCount(f) > 1) parts.push("x" + fitCount(f) + " fits");
      if (!(symptom && f.speech === "normal")) parts.push(SPEECH_LBL[f.speech]);
      MOTOR_FLAGS.forEach(function (m) { if (f[m.key]) parts.push(m.label.toLowerCase()); });
      if (f.environment) parts.push(cap(f.environment));
      if (f.durationSeconds != null) parts.push(fmtDuration(f.durationSeconds));
      if (!symptom && f.recoverySeconds != null) parts.push("recovery " + fmtDuration(f.recoverySeconds));
      if (f.triggers.length) parts.push("triggers: " + f.triggers.join(", "));
      if (hasWeather(f)) parts.push(weatherLabel(f.weatherCode) + " " + fmtTemp(f.tempC) +
        (f.apparentC != null ? " (feels " + fmtTemp(f.apparentC) + ")" : ""));
      if (f.by) parts.push("by " + f.by);
      if (f.notes) parts.push('"' + f.notes + '"');
      out += "  " + parts.join(" | ") + "\n";
    });
    return out;
  }
  function buildCSV() {
    const head = ["timestamp", "date", "time", "type", "count", "speech"]
      .concat(MOTOR_FLAGS.map(function (m) { return m.csv; }))
      .concat(["environment", "duration_seconds", "recovery_seconds", "triggers", "logged_by", "lat", "lng", "accuracy_m", "temp_c", "apparent_c", "humidity_pct", "weather", "notes"]);

      ].concat(MOTOR_FLAGS.map(function (m) { return f[m.key] ? "yes" : "no"; })).concat([
        f.environment || "", f.durationSeconds == null ? "" : f.durationSeconds,
        f.recoverySeconds == null ? "" : f.recoverySeconds,
        f.triggers.join("; "), f.by || "", f.lat == null ? "" : f.lat, f.lng == null ? "" : f.lng,
        f.acc == null ? "" : f.acc,

        f.humidity == null ? "" : f.humidity, f.weatherCode == null ? "" : weatherLabel(f.weatherCode),
        f.notes || ""
      ]).map(csvCell).join(",");
    });

  }
  function csvCell(v) { v = String(v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; }

  function fmtAgo(ts) {
    if (!ts) return "";
    const s = Math.round((Date.now() - ts) / 1000);
    if (s < 10) return "just now";
    if (s < 60) return s + "s ago";
    const m = Math.round(s / 60);
    if (m < 60) return m + "m ago";
    const h = Math.round(m / 60);
    return h + "h ago";
  }
  function setSyncStatus(state, text) {
    if (!syncStatusEl) return;
    syncStatusEl.className = "sync-btn " + state;
    syncStatusEl.title = text;
    syncStatusEl.innerHTML = SYNC_ICONS[state] || "";
  }
  function refreshSyncStatus() {
    if (!spaceCode) { setSyncStatus("local", "Local only — tap to share"); return; }
    if (syncing) { setSyncStatus("syncing", "Syncing…"); return; }
    if (!navigator.onLine) { setSyncStatus("offline", "Offline — will sync when online"); return; }
    if (syncError) { setSyncStatus("error", "Sync failed — tap to retry"); return; }
    const last = load(LASTSYNC_KEY, 0);
    setSyncStatus("ok", "Synced " + (last ? fmtAgo(last) : "just now"));
  }

  function scheduleSync() {
    clearTimeout(syncTimer);
    syncTimer = setTimeout(syncNow, 1500);
  }

  function mergeRemote(remote) {
    const byId = {};
    fits.forEach(function (f) { byId[f.id] = f; });
    let changed = false;
    remote.forEach(function (r) {
      if (!r || typeof r.id !== "string") return;
      const cur = byId[r.id];
      if (!cur || (r.updatedAt || 0) > (cur.updatedAt || 0)) {
        byId[r.id] = r; changed = true;
      }
    });
    if (changed) {
      fits = Object.keys(byId).map(function (k) { return byId[k]; });
      persistFits();
    }
    return changed;
  }

  async function syncNow() {
    if (!spaceCode || syncing) return;
    syncing = true; syncError = false; refreshSyncStatus();
    try {
      // Push dirty fits
      if (dirty.length) {
        const pushing = dirty.slice();
        const payload = fits.filter(function (f) { return pushing.indexOf(f.id) >= 0; });
        const res = await fetch("/api/fits", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ code: spaceCode, fits: payload }),
        });
        if (!res.ok) throw new Error("push failed");
        clearDirty(pushing);
      }
      // Pull all + merge
      const res = await fetch("/api/fits?code=" + encodeURIComponent(spaceCode), { cache: "no-store" });
      if (!res.ok) throw new Error("pull failed");
      const data = await res.json();
      const changed = mergeRemote(data.fits || []);
      save(LASTSYNC_KEY, Date.now());
      syncing = false;
      refreshSyncStatus();
      if (changed) {
        updateTodayCount();
        if (views.review.classList.contains("active")) renderReview();
        if (views.insights.classList.contains("active")) renderInsights();
      }
    } catch (e) {
      // Leave dirty intact for retry; reflect offline/error state.
      syncing = false;
      if (navigator.onLine) syncError = true;
      refreshSyncStatus();
    }
  }

  (function parseHash() {

  // One-time terminology migration: apraxic → disturbed, environment walking → outside,
  // "Strong emotion" → "Emotions", "Tiredness" → "Tired". Trigger renames map both stored
  // records and the vocab so old tags don't split from the renamed option in summaries/insights.
  (function migrateTerms() {
    var TRIG_RENAMES = { "Strong emotion": "Emotions", "Tiredness": "Tired" };
    var fitsChanged = false, trigChanged = false;
    fits.forEach(function (f) {
      var touched = false;
      if (f.speech === "apraxic") { f.speech = "disturbed"; touched = true; }
      if (f.environment === "walking") { f.environment = "outside"; touched = true; }
      if (f.triggers) {
        var seen = {}, mapped = [];
        f.triggers.forEach(function (t) {
          var name = TRIG_RENAMES[t] || t;
          if (TRIG_RENAMES[t]) touched = true;
          if (!seen[name]) { seen[name] = true; mapped.push(name); }
          else touched = true; // collapsed a duplicate created by the rename
        });
        f.triggers = mapped;
      }
      if (touched) { f.updatedAt = Date.now(); markDirty(f.id); fitsChanged = true; }
    });
    Object.keys(TRIG_RENAMES).forEach(function (oldName) {
      var vi = triggerVocab.indexOf(oldName);
      if (vi >= 0) {
        var newName = TRIG_RENAMES[oldName];
        // Avoid a duplicate if the renamed value already exists in the vocab.
        if (triggerVocab.indexOf(newName) >= 0) triggerVocab.splice(vi, 1);
        else triggerVocab[vi] = newName;
        trigChanged = true;
      }
    });
    if (fitsChanged) persistFits();
    if (trigChanged) persistTriggers();
  })();

  renderGrid();
  deactivate();
  updateTodayCount();
  refreshSyncStatus();
  // First render uses the cached ranking (instant); freshen it shortly after load
  // so it reflects current local data without blocking startup or the LOG press.
  if (!usageRank) refreshUsage(); else setTimeout(refreshUsage, 1500);

  function maybeSync() { if (spaceCode && navigator.onLine && !document.hidden) syncNow(); }

  if (spaceCode) syncNow();
  // Poll every 10s while the app is in the foreground. Mobile browsers throttle
  // background timers, so we also sync on focus/visibility/online to catch up promptly.
  setInterval(maybeSync, 10000);
  window.addEventListener("online", function () { refreshSyncStatus(); if (spaceCode) syncNow(); });
  window.addEventListener("offline", refreshSyncStatus);
  window.addEventListener("focus", maybeSync);
  document.addEventListener("visibilitychange", maybeSync);
})();
</script>
</body>
</html>

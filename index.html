<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0f1320" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fitful" />
<title>Fitful</title>
<style>
  :root {
    --bg: #0f1320;
    --bg2: #171c2e;
    --card: #1d2336;
    --line: #2a3149;
    --text: #eef1f8;
    --muted: #9aa3bd;
    --accent: #5b8cff;
    --accent2: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
    /* One hue per logging category — used identically wherever the category appears
       (cube label, selected chip, review pill). Set --cat per data-cat below so the
       contexts can never drift; adding a category = one token + one data-cat map. */
    --cat-speech: #5b8cff;
    --cat-oral: #fbbf24;
    --cat-involuntary: #c084fc;
    --cat-where: #34d399;
    --cat-triggers: #f472b6;
    /* "Symptom episode" (count 0) is a state, not a category — its own token. */
    --symptom: #fb923c;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  .view { flex: 1; overflow-y: auto; padding: calc(var(--safe-top) + 14px) 16px 16px; display: none; }
  .view.active { display: block; }
  h1 { font-size: 20px; margin: 4px 0 16px; font-weight: 700; letter-spacing: .2px; }
  h2 { font-size: 15px; margin: 22px 0 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .6px; }

  /* ---------- Tab bar ---------- */
  nav {
    display: flex; border-top: 1px solid var(--line);
    background: var(--bg2);
    padding-bottom: var(--safe-bottom);
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 12px 0 10px; font-size: 12px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
  }
  nav button .dot { width: 22px; height: 22px; border-radius: 7px; background: var(--line); transition: background .15s; }
  nav button.active { color: var(--text); }
  nav button.active .dot { background: var(--accent); }

  /* ---------- Log screen ---------- */
  #log-view { display: none; position: relative; }
  #log-view.active { display: flex; flex-direction: column; }
  .log-stage {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    position: relative; min-height: 60vh; padding-top: 6px;
  }
  .log-head { text-align: center; margin: 2px 0 4px; }
  .log-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    width: 100%; max-width: 460px; margin: 2px auto 0;
  }
  .cube {
    border: 1.5px solid var(--line); background: var(--card); color: var(--text);
    border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    gap: 4px; padding: 6px 6px; height: 126px; cursor: default; text-align: center; overflow: hidden;
    transition: border-color .2s, background .2s; position: relative;
  }
  /* Scroll signifier: when a cube's chips overflow and it isn't scrolled to the end,
     a bottom fade + a small chevron hint that there's more below. Toggled via .more. */
  .cube.more::before {
    content: ""; position: absolute; left: 6px; right: 6px; bottom: 4px; height: 30px;
    background: linear-gradient(180deg, transparent, var(--card)); pointer-events: none;
    border-radius: 0 0 14px 14px;
  }
  .cube.more::after {
    content: "\2304"; position: absolute; left: 0; right: 0; bottom: 1px; text-align: center;
    font-size: 17px; line-height: 1; font-weight: 800; color: var(--muted); pointer-events: none;
  }
  .cube[data-tile="when"] { gap: 4px; }
  /* Each cube sets --cat from its category; label + selected chips derive from it. */
  .cube[data-cat="speech"]      { --cat: var(--cat-speech); }
  .cube[data-cat="oral"]        { --cat: var(--cat-oral); }
  .cube[data-cat="involuntary"] { --cat: var(--cat-involuntary); }
  .cube[data-cat="where"]       { --cat: var(--cat-where); }
  .cube[data-cat="triggers"]    { --cat: var(--cat-triggers); }
  .cube .cube-label { font-size: 10px; font-weight: 800; letter-spacing: .3px; text-transform: uppercase; color: var(--cat, var(--muted)); flex: 0 0 auto; }
  /* Chip area scrolls inside the cube when a category has many options (e.g. Triggers),
     so every cube stays the same height and the 3×3 grid stays compact on small phones. */
  .cube-opts { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-content: flex-start; width: 100%; flex: 1 1 auto; overflow-y: auto; scrollbar-width: none; }
  .cube-opts::-webkit-scrollbar { display: none; }
  .mini {
    border: 1px solid var(--line); background: var(--bg2); color: var(--text);
    border-radius: 10px; padding: 4px 8px; font-size: 13px; font-weight: 700; line-height: 1.05; cursor: pointer;
  }
  .mini:active { transform: scale(.93); }
  .mini.add { border-style: dashed; color: var(--muted); }
  .mini.on {
    border-color: var(--cat, var(--accent));
    background: color-mix(in srgb, var(--cat, var(--accent)) 22%, transparent);
    color: color-mix(in srgb, var(--cat, var(--accent)) 55%, white);
  }
  /* When cube (time only — count moved below the grid) */
  .when-time { border: 1px solid var(--line); background: var(--bg2); color: var(--text); border-radius: 10px; padding: 8px 14px; font-size: 22px; font-weight: 800; cursor: pointer; font-variant-numeric: tabular-nums; margin-top: 4px; }
  /* Fit-count stepper below the grid */
  .log-count { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; width: 100%; max-width: 460px; margin: 10px auto 0; text-align: center; }
  .log-count[hidden] { display: none; }
  .log-count .lc-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); }
  .log-count .lc-step { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .log-count button { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--line); background: var(--card); color: var(--text); font-size: 24px; font-weight: 700; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .log-count button:active { transform: scale(.93); }
  .log-count b { font-size: 28px; font-weight: 800; min-width: 28px; text-align: center; font-variant-numeric: tabular-nums; }
  .log-count .lc-sx { font-size: 12px; font-weight: 800; color: var(--symptom); text-transform: uppercase; letter-spacing: .4px; }
  .log-count:not(.symptom) .lc-sx { color: var(--muted); opacity: .7; }
  .log-count.symptom b { color: var(--symptom); }
  /* Notes cube */
  .notes-open { border: 1px dashed var(--line); background: transparent; color: var(--muted); border-radius: 10px; padding: 7px 15px; font-size: 16.5px; font-weight: 700; cursor: pointer; }
  .notes-open.has { border-style: solid; border-color: var(--accent); color: #cfe0ff; }
  /* Idle (before LOG): outer cubes hidden, centre LOG alone — like the closed wheel. */
  .log-grid.idle .cube:not(.cube-log) { visibility: hidden; }
  .cube-log {
    border: none; color: #fff; font-size: 22px; font-weight: 800; letter-spacing: .5px;
    justify-content: center; align-items: center;
    background: radial-gradient(circle at 35% 30%, #6f9bff, #3b6fe0);
    box-shadow: 0 10px 28px rgba(59,111,224,.42), inset 0 -5px 12px rgba(0,0,0,.18);
  }
  .cube-log:active { transform: scale(.94); }
  .cube-log.done { background: radial-gradient(circle at 35% 30%, #4be0a0, #1fae78); box-shadow: 0 8px 24px rgba(31,174,120,.4); }
  .log-status { display: inline-flex; align-items: center; gap: 7px; background: none; border: none; padding: 4px 2px; color: var(--text); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .log-status[hidden] { display: none; }
  .log-status .ls-text { color: var(--text); }
  .sync-btn { margin-left: auto; flex: none; background: none; border: none; padding: 4px; width: 34px; height: 34px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--muted); }
  .sync-btn svg { width: 22px; height: 22px; display: block; }
  .sync-btn.ok { color: var(--accent2); }
  .sync-btn.syncing { color: var(--accent); }
  .sync-btn.offline { color: var(--warn); }
  .sync-btn.error { color: var(--danger); }
  .sync-btn.local { color: var(--muted); }
  .sync-btn.syncing svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #toast {
    position: fixed; left: 50%; bottom: calc(90px + var(--safe-bottom)); transform: translateX(-50%) translateY(20px);
    background: var(--accent2); color: #04240f; padding: 10px 18px; border-radius: 999px;
    font-weight: 700; font-size: 14px; opacity: 0; pointer-events: none; transition: all .25s; z-index: 50;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Cards / list ---------- */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .fit-row { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .fit-row .time { font-size: 17px; font-weight: 700; }
  .fit-row .meta { color: var(--muted); font-size: 12.5px; margin-top: 3px; display: flex; flex-wrap: wrap; gap: 6px; }
  /* Overflow counter when a fit's tags don't fit in the two visible rows. */
  .pill.more-pills { color: var(--muted); font-weight: 700; }
  .pill { background: var(--bg2); border: 1px solid var(--line); border-radius: 999px; padding: 2px 9px; font-size: 11px; font-weight: 600; }
  .pill.speech { color: var(--cat-speech); } .pill.oral { color: var(--cat-oral); } .pill.involuntary { color: var(--cat-involuntary); } .pill.env { color: var(--cat-where); }
  .pill.dur { color: var(--text); } .pill.trig { color: var(--cat-triggers); }
  .pill.wx { color: var(--text); }
  .wx-line { font-size: 14px; color: var(--text); padding: 4px 0; }
  .fit-row .chev { margin-left: auto; color: var(--muted); font-size: 20px; }
  .day-head { color: var(--muted); font-size: 13px; font-weight: 700; margin: 18px 0 8px; }
  .empty { color: var(--muted); text-align: center; margin-top: 40px; font-size: 15px; line-height: 1.5; }

  /* ---------- Editor (modal sheet) ---------- */
  #sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 60; }
  #sheet-backdrop.show { opacity: 1; pointer-events: auto; }
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 61;
    background: var(--bg2); border-radius: 18px 18px 0 0; border-top: 1px solid var(--line);
    padding: 16px 16px calc(20px + var(--safe-bottom)); transform: translateY(100%); transition: transform .25s ease;
    max-height: 90vh; overflow-y: auto;
  }
  #sheet.show { transform: translateY(0); }
  .sheet-grab { width: 40px; height: 4px; border-radius: 4px; background: var(--line); margin: 0 auto 12px; }
  .field { margin-bottom: 16px; }
  /* Category fields tint their heading with the category hue (others stay muted). */
  .field > label { display: block; font-size: 12px; color: var(--cat, var(--muted)); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1.5px solid var(--line); background: var(--card); color: var(--text);
    border-radius: 999px; padding: 9px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  /* Editor fields inherit the same per-category hue as the grid (set --cat per field). */
  .field.cat-speech      { --cat: var(--cat-speech); }
  .field.cat-oral        { --cat: var(--cat-oral); }
  .field.cat-involuntary { --cat: var(--cat-involuntary); }
  .field.cat-where       { --cat: var(--cat-where); }
  .field.cat-triggers    { --cat: var(--cat-triggers); }
  /* Even unselected, a category's chips carry a faint tint of its hue (the colour base). */
  .field[class*="cat-"] .chip:not(.add) { border-color: color-mix(in srgb, var(--cat) 40%, var(--line)); }
  .chip.on {
    border-color: var(--cat, var(--accent));
    background: color-mix(in srgb, var(--cat, var(--accent)) 16%, transparent);
    color: color-mix(in srgb, var(--cat, var(--accent)) 55%, white);
  }
  /* Add / Clear / Custom controls don't represent a category — keep them neutral. */
  .chip.add { border-style: dashed; border-color: var(--line); color: var(--muted); }
  .chip .chip-x { margin-left: 7px; font-weight: 800; opacity: .75; }
  textarea {
    width: 100%; background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    color: var(--text); padding: 12px; font: inherit; resize: vertical; min-height: 64px;
  }
  .btn {
    width: 100%; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
    background: var(--accent); color: #fff; margin-top: 6px;
  }
  .btn.ghost { background: var(--card); color: var(--text); border: 1px solid var(--line); }
  .btn.danger { background: transparent; color: var(--danger); }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { margin-top: 0; }

  /* ---------- Insights ---------- */
  .outlier-toggle { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin-bottom: 12px; cursor: pointer; }
  .outlier-toggle .lbl { font-size: 13px; font-weight: 600; }
  .outlier-toggle .lbl small { display: block; font-weight: 400; font-size: 11px; color: var(--muted); margin-top: 2px; }
  .outlier-toggle .sw { flex: 0 0 auto; width: 42px; height: 24px; border-radius: 999px; background: #2a3149; position: relative; transition: background .15s; }
  .outlier-toggle .sw::after { content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform .15s; }
  .outlier-toggle.on .sw { background: #5b8cff; }
  .outlier-toggle.on .sw::after { transform: translateX(18px); }
  .outlier-note { font-size: 11px; color: var(--muted); margin: -4px 0 12px; line-height: 1.3; }
  .chart-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
  .chart-card .title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .chart-card .sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; text-align: center; }
  .stat b { display: block; font-size: 26px; font-weight: 800; }
  .stat span { font-size: 11px; color: var(--muted); font-weight: 600; }
  .hbar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .hbar-row .lbl { width: 96px; flex-shrink: 0; color: var(--muted); font-weight: 600; }
  .hbar-track { flex: 1; background: var(--bg); border-radius: 6px; height: 18px; overflow: hidden; }
  .hbar-fill { display: block; height: 100%; min-width: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 6px; }
  .hbar-row .val { width: 40px; text-align: right; font-weight: 700; }
  svg { display: block; width: 100%; }
  .axis { fill: var(--muted); font-size: 9px; }
  /* ---------- Correlation explorer ---------- */
  .corr-controls { display: flex; gap: 10px; margin-bottom: 12px; }
  .corr-controls label { flex: 1; font-size: 11px; color: var(--muted); font-weight: 600; }
  .corr-select { width: 100%; margin-top: 4px; padding: 8px 10px; font-size: 13px; color: var(--text);
    background: var(--bg); border: 1px solid var(--line); border-radius: 10px; -webkit-appearance: none; appearance: none; }
  .corr-meta { margin-top: 8px; font-size: 12px; color: var(--muted); }
  .corr-meta .corr-r { color: var(--text); font-weight: 700; }
  .corr-eff { margin-top: 8px; font-size: 13px; font-weight: 700; color: var(--text); }
  .corr-empty { padding: 18px 4px; font-size: 13px; color: var(--muted); text-align: center; }
  .corr-cap { margin-top: 10px; font-size: 11px; color: var(--muted); line-height: 1.3; font-style: italic; }
  .np-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; width: 100%;
    padding: 10px 12px; margin-bottom: 8px; background: var(--bg); border: 1px solid var(--line);
    border-radius: 10px; text-align: left; cursor: pointer; }
  .np-row:last-child { margin-bottom: 0; }
  .np-row .np-text { font-size: 13px; font-weight: 600; color: var(--text); }
  .np-row .np-meta { font-size: 11px; color: var(--muted); flex-shrink: 0; }

  /* ---------- Header row + sync ---------- */
  .head-row { display: flex; align-items: center; gap: 10px; margin: 4px 0 12px; }
  #settingsBtn { background: var(--card); border: 1px solid var(--line); color: var(--muted); width: 38px; height: 38px; border-radius: 10px; font-size: 18px; cursor: pointer; flex: none; }
  .pill.by { color: var(--muted); }
  .code-box { font-size: 26px; font-weight: 800; letter-spacing: 4px; text-align: center; background: var(--card); border: 1.5px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .field input { width: 100%; background: var(--card); border: 1.5px solid var(--line); border-radius: 12px; color: var(--text); padding: 12px; font: inherit; }
  .note { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 4px; }

  /* ---------- Tile panel (per-category bottom sheet) ---------- */
  #tilePanel-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 62; }
  #tilePanel-backdrop.show { opacity: 1; pointer-events: auto; }
  #tilePanel {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 63;
    background: var(--bg2); border-radius: 18px 18px 0 0; border-top: 1px solid var(--line);
    padding: 16px 16px calc(20px + var(--safe-bottom)); transform: translateY(100%); transition: transform .25s ease;
    max-height: 90vh; overflow-y: auto;
  }
  #tilePanel.show { transform: translateY(0); }
  .tp-panel-head { font-size: 18px; font-weight: 800; text-align: center; margin: 2px 0 14px; }

  /* ---------- Time picker (drum/wheel) ---------- */
  #tp-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 70; }
  #tp-backdrop.show { opacity: 1; pointer-events: auto; }
  #tp {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 71;
    background: var(--bg2); border-radius: 18px 18px 0 0; border-top: 1px solid var(--line);
    padding: 16px 16px calc(20px + var(--safe-bottom)); transform: translateY(100%); transition: transform .25s ease;
  }
  #tp.show { transform: translateY(0); }
  .tp-label { text-align: center; font-size: 22px; font-weight: 800; margin: 4px 0 14px; }
  .tp-wheels { display: flex; justify-content: center; align-items: center; gap: 4px; position: relative; height: 240px; }
  .tp-wheels::before {
    content: ""; position: absolute; left: 50%; transform: translateX(-50%); width: 188px;
    top: 96px; height: 48px; border-top: 1.5px solid var(--accent); border-bottom: 1.5px solid var(--accent);
    border-radius: 10px; pointer-events: none;
  }
  .tp-colon { font-size: 30px; font-weight: 800; color: var(--muted); }
  .tp-wheel {
    height: 240px; width: 84px; overflow-y: auto; scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
    mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
  }
  .tp-wheel::-webkit-scrollbar { display: none; }
  .tp-opt { height: 48px; line-height: 48px; text-align: center; font-size: 28px; font-weight: 700; color: var(--muted); scroll-snap-align: center; }
  .tp-opt.sel { color: var(--text); }
  .tp-spacer { height: 96px; }
  .tp-pills { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
  .tp-pill {
    flex: 1; border: 1.5px solid var(--line); background: var(--card); color: var(--text);
    border-radius: 999px; padding: 11px 14px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .tp-pill.on { border-color: var(--accent); background: rgba(91,140,255,.15); color: #cfe0ff; }
  .editor-time { background: var(--card); border: 1px solid var(--line); color: var(--text); border-radius: 12px; padding: 12px 14px; font-size: 18px; font-weight: 800; width: 100%; text-align: left; cursor: pointer; margin: 0 0 16px; }
  .editor-time .edit-hint { float: right; color: var(--muted); font-weight: 600; font-size: 14px; }
  .stepper { display: flex; align-items: center; gap: 18px; }
  .step-btn {
    width: 52px; height: 52px; border-radius: 50%; border: 1.5px solid var(--line);
    background: var(--card); color: var(--text); font-size: 28px; font-weight: 700; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .step-btn:active { transform: scale(.92); }
  .stepper b { font-size: 30px; font-weight: 800; min-width: 44px; text-align: center; font-variant-numeric: tabular-nums; }
  .count-badge { display: inline-block; margin-left: 8px; background: rgba(91,140,255,.18); color: #cfe0ff; border-radius: 999px; padding: 1px 9px; font-size: 14px; font-weight: 800; vertical-align: middle; }
  .count-badge.symptom { background: color-mix(in srgb, var(--symptom) 18%, transparent); color: var(--symptom); font-size: 12px; }
</style>
</head>
<body>
<div id="app">
  <!-- LOG -->
  <section id="log-view" class="view active">
    <div class="head-row">
      <button class="log-status" id="logStatus" hidden aria-label="Last log"><span class="ls-text"></span></button>
      <button class="sync-btn" id="syncIcon" aria-label="Sync status"></button>
      <button id="settingsBtn" aria-label="Settings">⚙</button>
    </div>
    <div class="log-stage">
      <div class="log-grid idle" id="logGrid"></div>
      <div class="log-count" id="logCount" hidden>
        <span class="lc-label">Fits</span>
        <div class="lc-step">
          <button id="logCountMinus" aria-label="Fewer">&minus;</button>
          <b id="logCountVal">1</b>
          <button id="logCountPlus" aria-label="More">+</button>
        </div>
        <span class="lc-sx">0 = symptom</span>
      </div>
    </div>
  </section>

  <!-- REVIEW -->
  <section id="review-view" class="view">
    <h1>Review</h1>
    <div id="reviewList"></div>
  </section>

  <!-- INSIGHTS -->
  <section id="insights-view" class="view">
    <h1>Insights</h1>
    <div id="insightsBody"></div>
  </section>

  <nav>
    <button data-tab="log" class="active"><span class="dot"></span>Log</button>
    <button data-tab="review"><span class="dot"></span>Review</button>
    <button data-tab="insights"><span class="dot"></span>Insights</button>
  </nav>
</div>

<div id="toast"></div>
<div id="sheet-backdrop"></div>
<div id="sheet"></div>
<div id="tilePanel-backdrop"></div>
<div id="tilePanel"></div>
<div id="tp-backdrop"></div>
<div id="tp"></div>

<script>
"use strict";
(function () {
  // ---------------- Storage ----------------
  const FITS_KEY = "fitrack.fits.v1";
  const TRIG_KEY = "fitrack.triggers.v1";
  const SEED_TRIGGERS = ["Stress", "Tired", "Poor sleep", "Hunger", "Sensory overload", "Emotions", "Heat", "Exertion"];

  function load(key, fallback) {
    try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? fallback : v; }
    catch (e) { return fallback; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  let fits = load(FITS_KEY, []);
  let triggerVocab = load(TRIG_KEY, SEED_TRIGGERS.slice());
  function persistFits() { save(FITS_KEY, fits); }
  function persistTriggers() { save(TRIG_KEY, triggerVocab); }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  // ---------------- Sync state ----------------
  const SPACE_KEY = "fitful.space";    // shared space code
  const DEVICE_KEY = "fitful.device";  // logger name
  const DIRTY_KEY = "fitful.dirty";    // array of fit ids pending push
  const LASTSYNC_KEY = "fitful.lastSync";
  const CODE_ALPHABET = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // no 0/O/1/I/L
  const CODE_LEN = 6;

  let spaceCode = load(SPACE_KEY, "") || "";
  let deviceName = load(DEVICE_KEY, "") || "";
  let dirty = load(DIRTY_KEY, []);

  function markDirty(id) {
    if (dirty.indexOf(id) < 0) { dirty.push(id); save(DIRTY_KEY, dirty); }
    scheduleSync();
  }
  function clearDirty(ids) {
    dirty = dirty.filter(function (id) { return ids.indexOf(id) < 0; });
    save(DIRTY_KEY, dirty);
  }
  // Active (non-deleted) fits — all display/export paths use this; raw `fits` keeps tombstones for sync.
  function active() { return fits.filter(function (f) { return !f.deleted; }); }
  function genCode() {
    let s = "";
    const buf = new Uint32Array(CODE_LEN);
    (crypto && crypto.getRandomValues) ? crypto.getRandomValues(buf) : buf.forEach(function (_, i) { buf[i] = Math.floor(Math.random() * 1e9); });
    for (let i = 0; i < CODE_LEN; i++) s += CODE_ALPHABET[buf[i] % CODE_ALPHABET.length];
    return s;
  }

  // ---------------- Geolocation ----------------
  function captureLocation(fit) {
    if (!("geolocation" in navigator)) return;
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        fit.lat = +pos.coords.latitude.toFixed(6);
        fit.lng = +pos.coords.longitude.toFixed(6);
        fit.acc = Math.round(pos.coords.accuracy);
        fit.updatedAt = Date.now();
        persistFits();
        markDirty(fit.id);
        applyWeather(fit);
      },
      function () { /* denied or unavailable — fit still valid */ },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
    );
  }

  // ---------------- Weather (Open-Meteo, keyless) ----------------
  // WMO weather interpretation codes → short label + emoji. Stored canonical: tempC (°C).
  const WEATHER_CODES = {
    0: ["Clear", "☀️"], 1: ["Mainly clear", "🌤️"], 2: ["Partly cloudy", "⛅"], 3: ["Overcast", "☁️"],
    45: ["Fog", "🌫️"], 48: ["Rime fog", "🌫️"],
    51: ["Light drizzle", "🌦️"], 53: ["Drizzle", "🌦️"], 55: ["Dense drizzle", "🌧️"],
    56: ["Freezing drizzle", "🌧️"], 57: ["Freezing drizzle", "🌧️"],
    61: ["Light rain", "🌦️"], 63: ["Rain", "🌧️"], 65: ["Heavy rain", "🌧️"],
    66: ["Freezing rain", "🌧️"], 67: ["Freezing rain", "🌧️"],
    71: ["Light snow", "🌨️"], 73: ["Snow", "🌨️"], 75: ["Heavy snow", "❄️"], 77: ["Snow grains", "🌨️"],
    80: ["Showers", "🌦️"], 81: ["Showers", "🌧️"], 82: ["Violent showers", "⛈️"],
    85: ["Snow showers", "🌨️"], 86: ["Snow showers", "❄️"],
    95: ["Thunderstorm", "⛈️"], 96: ["Thunderstorm + hail", "⛈️"], 99: ["Thunderstorm + hail", "⛈️"],
  };
  function weatherLabel(code) { const w = WEATHER_CODES[code]; return w ? w[0] : "Weather"; }
  function weatherEmoji(code) { const w = WEATHER_CODES[code]; return w ? w[1] : "🌡️"; }
  function fmtTemp(c) { return c == null ? null : Math.round(c) + "°C"; }
  function hasWeather(f) { return f && f.tempC != null; }

  // Cache by rounded location (~1km) for ~10 min so rapid logs reuse one network call.
  const weatherCache = {};
  function fetchWeather(lat, lng) {
    const key = lat.toFixed(2) + "," + lng.toFixed(2);
    const now = Date.now();
    const hit = weatherCache[key];
    if (hit && now - hit.at < 600000) return Promise.resolve(hit.data);
    const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat.toFixed(4) +
      "&longitude=" + lng.toFixed(4) +
      "&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code";
    return fetch(url).then(function (r) { return r.ok ? r.json() : null; }).then(function (j) {
      if (!j || !j.current) return null;
      const c = j.current;
      const data = {
        tempC: c.temperature_2m == null ? null : +(+c.temperature_2m).toFixed(1),
        apparentC: c.apparent_temperature == null ? null : +(+c.apparent_temperature).toFixed(1),
        humidity: c.relative_humidity_2m == null ? null : Math.round(c.relative_humidity_2m),
        weatherCode: c.weather_code == null ? null : c.weather_code,
      };
      weatherCache[key] = { at: now, data: data };
      return data;
    }).catch(function () { return null; });
  }
  function applyWeather(fit) {
    if (fit.lat == null || fit.lng == null || hasWeather(fit)) return;
    fetchWeather(fit.lat, fit.lng).then(function (w) {
      if (!w || w.tempC == null) return;
      fit.tempC = w.tempC; fit.apparentC = w.apparentC; fit.humidity = w.humidity; fit.weatherCode = w.weatherCode;
      fit.updatedAt = Date.now();
      persistFits();
      markDirty(fit.id);
      if (editingId === fit.id) openEditor(fit.id);
      if (views.review && views.review.classList.contains("active")) renderReview();
    });
  }

  // Historical weather for backfill. Open-Meteo: archive API (>~5 days old) or forecast
  // past_days (recent). Cached per rounded-location + date so one call serves many records.
  function localDateStr(ts) {
    const d = new Date(ts), p = function (n) { return n < 10 ? "0" + n : "" + n; };
    return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
  }
  function localHourKey(ts) {
    const d = new Date(ts), p = function (n) { return n < 10 ? "0" + n : "" + n; };
    return localDateStr(ts) + "T" + p(d.getHours());
  }
  const histCache = {};
  function fetchHistWeather(lat, lng, ts) {
    const date = localDateStr(ts);
    const key = lat.toFixed(2) + "," + lng.toFixed(2) + "," + date;
    if (histCache[key] !== undefined) return Promise.resolve(histCache[key]);
    const ageDays = (Date.now() - ts) / 86400000;
    const hourly = "temperature_2m,apparent_temperature,relative_humidity_2m,weather_code";
    let url;
    if (ageDays < 6) {
      const past = Math.min(92, Math.max(1, Math.ceil(ageDays) + 1));
      url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat.toFixed(4) + "&longitude=" + lng.toFixed(4) +
        "&hourly=" + hourly + "&past_days=" + past + "&forecast_days=1&timezone=auto";
    } else {
      url = "https://archive-api.open-meteo.com/v1/archive?latitude=" + lat.toFixed(4) + "&longitude=" + lng.toFixed(4) +
        "&start_date=" + date + "&end_date=" + date + "&hourly=" + hourly + "&timezone=auto";
    }
    return fetch(url).then(function (r) { return r.ok ? r.json() : null; }).then(function (j) {
      const data = (j && j.hourly && j.hourly.time) ? j.hourly : null;
      histCache[key] = data;
      return data;
    }).catch(function () { histCache[key] = null; return null; });
  }
  function pickHour(hourly, ts) {
    if (!hourly || !hourly.time) return null;
    const want = localHourKey(ts);
    let idx = hourly.time.findIndex(function (t) { return t.slice(0, 13) === want; });
    if (idx < 0) {
      const dstr = localDateStr(ts);
      idx = hourly.time.findIndex(function (t) { return t.slice(0, 10) === dstr; });
    }
    if (idx < 0) return null;
    const t = hourly.temperature_2m ? hourly.temperature_2m[idx] : null;
    if (t == null) return null;
    const ap = hourly.apparent_temperature, hu = hourly.relative_humidity_2m, wc = hourly.weather_code;
    return {
      tempC: +(+t).toFixed(1),
      apparentC: ap && ap[idx] != null ? +(+ap[idx]).toFixed(1) : null,
      humidity: hu && hu[idx] != null ? Math.round(hu[idx]) : null,
      weatherCode: wc && wc[idx] != null ? wc[idx] : null,
    };
  }
  let backfilling = false;
  function backfillWeather() {
    if (backfilling) return;
    const todo = active().filter(function (f) { return f.lat != null && f.lng != null && !hasWeather(f); });
    const btn = document.getElementById("backfillBtn");
    if (!todo.length) { if (btn) btn.textContent = "Weather up to date"; return; }
    backfilling = true;
    let done = 0, filled = 0;
    function setLabel() { if (btn) { btn.disabled = true; btn.textContent = "Backfilling… " + done + "/" + todo.length; } }
    setLabel();
    function step(i) {
      if (i >= todo.length) {
        backfilling = false;
        persistFits();
        if (btn) { btn.disabled = false; btn.textContent = "Backfilled " + filled + " record" + (filled === 1 ? "" : "s"); }
        if (views.review && views.review.classList.contains("active")) renderReview();
        return;
      }
      const f = todo[i];
      fetchHistWeather(f.lat, f.lng, f.ts).then(function (hourly) {
        const w = pickHour(hourly, f.ts);
        if (w && w.tempC != null) {
          f.tempC = w.tempC; f.apparentC = w.apparentC; f.humidity = w.humidity; f.weatherCode = w.weatherCode;
          f.updatedAt = Date.now(); markDirty(f.id); filled++;
          if (filled % 5 === 0) persistFits();
        }
        done++; setLabel();
        setTimeout(function () { step(i + 1); }, 120);
      });
    }
    step(0);
  }

  // ---------------- Log screen (3×3 cube grid) ----------------
  // Boolean Motor symptom flags — drives the grid, editor, Review pills, summary and CSV.
  // Add a future Motor flag by adding one entry here (grouped oral/involuntary for the grid).
  const MOTOR_FLAGS = [
    { key: "spitting",   label: "Spit",      csv: "spitting",      group: "oral" },
    { key: "dribbling",  label: "Drool",     csv: "dribbling",     group: "oral" },
    { key: "mouthClick", label: "Click",     csv: "mouth_click",   group: "oral" },
    { key: "mouthPop",   label: "Pop",       csv: "mouth_pop",     group: "oral" },
    { key: "laughing",   label: "Laugh",     csv: "laughing",      group: "involuntary" },
    { key: "arm",        label: "Arms",      csv: "arm_movements", group: "involuntary" },
    { key: "legs",       label: "Legs",      csv: "legs",          group: "involuntary" },
    { key: "head",       label: "Head",      csv: "head",          group: "involuntary" },
  ];

  // Single-select option lists, shared by the grid tile panels AND the editor chip rows
  // so the two never drift. Order = display order.
  const SPEECH_OPTS = [
    { value: "normal",    label: "OK" },
    { value: "none",      label: "None" },
    { value: "slurred",   label: "Slurred" },
    { value: "disturbed", label: "Disturbed" },
  ];
  const ENV_OPTS = [
    { value: "bed",     label: "Bed" },
    { value: "home",    label: "Home" },
    { value: "car",     label: "Car" },
    { value: "outside", label: "Outside" },
    { value: "other",   label: "Other" },
  ];

  // 3×3 grid config — single source of truth. Reading order is row-major; index 4 (centre)
  // is the LOG/Done action (represented by null). Add a category later = one entry here.
  const LOG_TILES = [
    { id: "speech",      label: "Speech",      kind: "single", field: "speech",      opts: SPEECH_OPTS },
    { id: "oral",        label: "Oral",        kind: "flags",  group: "oral" },
    { id: "involuntary", label: "Involuntary", kind: "flags",  group: "involuntary" },
    { id: "where",       label: "Where",       kind: "single", field: "environment", opts: ENV_OPTS },
    null, // centre = LOG / Done
    { id: "length",      label: "Length",      kind: "duration" },
    { id: "triggers",    label: "Triggers",    kind: "triggers" },
    { id: "when",        label: "When",        kind: "when" },
    { id: "notes",       label: "Notes",       kind: "notes" },
  ];

  const toastEl = document.getElementById("toast");
  const logGrid = document.getElementById("logGrid");
  let currentFit = null;     // the fit being tagged (null = idle)
  let logBtn = null;         // centre cube, assigned in renderGrid()

  // Each grid tile carries its own category colour via data-cat (drives --cat in CSS).
  const CUBE_CAT = { speech: "speech", oral: "oral", involuntary: "involuntary", where: "where", triggers: "triggers" };

  // ---- Usage ranking (cached) ----
  // Each cube shows its most-used option first. We DON'T scan records on every LOG
  // press — instead the counts are computed once and cached (in memory + localStorage).
  // A little staleness is fine: we refresh lazily on load and after each log session.
  const USAGE_KEY = "fitful.usage";
  // Recency-weighted ranking: every log counts, but its weight halves every 3 days, so
  // recently-used tags rise to the top while old history (e.g. a long run of "OK" speech)
  // fades — with no empty-window reset on quiet days. Anchored to each event's time.
  const USAGE_HALFLIFE_MS = 3 * 86400000;
  let usageRank = load(USAGE_KEY, null);
  function computeUsageRank() {
    const r = { speech: {}, motor: {}, environment: {}, triggers: {} };
    const now = Date.now();
    active().forEach(function (f) {
      const recency = Math.pow(0.5, Math.max(0, now - f.ts) / USAGE_HALFLIFE_MS);
      const w = (fitCount(f) || 1) * recency;
      if (f.speech) r.speech[f.speech] = (r.speech[f.speech] || 0) + w;
      MOTOR_FLAGS.forEach(function (m) { if (f[m.key]) r.motor[m.key] = (r.motor[m.key] || 0) + w; });
      if (f.environment) r.environment[f.environment] = (r.environment[f.environment] || 0) + w;
      (f.triggers || []).forEach(function (t) { r.triggers[t] = (r.triggers[t] || 0) + w; });
    });
    return r;
  }
  function refreshUsage() { usageRank = computeUsageRank(); save(USAGE_KEY, usageRank); }
  // Stable sort a copy of `items` by cached usage of `keyOf(item)` within `group`, desc.
  // Ties keep their original (config) order so the layout stays predictable.
  function byUsage(items, group, keyOf) {
    if (!usageRank || !usageRank[group]) return items.slice();
    const counts = usageRank[group];
    return items
      .map(function (it, i) { return { it: it, i: i, n: counts[keyOf(it)] || 0 }; })
      .sort(function (a, b) { return b.n - a.n || a.i - b.i; })
      .map(function (x) { return x.it; });
  }

  // ---- Build the grid shell (once) ----
  function renderGrid() {
    logGrid.innerHTML = "";
    LOG_TILES.forEach(function (t) {
      if (!t) {
        logBtn = document.createElement("button");
        logBtn.id = "logBtn";
        logBtn.className = "cube cube-log";
        logBtn.textContent = "LOG";
        logBtn.addEventListener("click", onLogBtn);
        logGrid.appendChild(logBtn);
        return;
      }
      const cube = document.createElement("div");
      cube.className = "cube";
      cube.dataset.tile = t.id;
      if (CUBE_CAT[t.id]) cube.dataset.cat = CUBE_CAT[t.id];
      logGrid.appendChild(cube);
    });
  }

  function onLogBtn() {
    if (currentFit) deactivate();   // centre shows "Done"
    else logNewFit();               // centre shows "LOG"
  }

  function activate() {
    logGrid.classList.remove("idle");
    if (logBtn) { logBtn.classList.add("done"); logBtn.textContent = "Done"; }
    renderCubes();
    renderCount();
  }
  function deactivate() {
    const hadSession = !!currentFit;
    currentFit = null;
    closeNotes();
    logGrid.classList.add("idle");
    if (logBtn) { logBtn.classList.remove("done"); logBtn.textContent = "LOG"; }
    renderCount();
    // Refresh the cached usage ranking after a real log session (never on LOG press).
    if (hadSession) refreshUsage();
  }

  // ---- Fit-count stepper (below the grid; 0 = symptom episode) ----
  const logCount = document.getElementById("logCount");
  function renderCount() {
    if (!currentFit) { logCount.hidden = true; return; }
    logCount.hidden = false;
    document.getElementById("logCountVal").textContent = currentFit.count;
    logCount.classList.toggle("symptom", isSymptom(currentFit));
  }
  function changeCount(delta) {
    if (!currentFit) return;
    currentFit.count = Math.max(0, currentFit.count + delta);
    saveFit();
    updateTodayCount();
    renderCubes();   // duration presets depend on isSymptom (count 0)
    renderCount();
  }
  document.getElementById("logCountMinus").addEventListener("click", function () { changeCount(-1); });
  document.getElementById("logCountPlus").addEventListener("click", function () { changeCount(1); });

  // ---- Render each cube's tappable symptom chips from the current fit ----
  function cubeInnerHtml(t) {
    const f = currentFit;
    if (t.kind === "when") {
      return '<span class="cube-label">When</span>' +
        '<button class="when-time" data-act="time">' + fmt24(f.ts) + '</button>';
    }
    if (t.kind === "notes") {
      return '<span class="cube-label">Notes</span>' +
        '<button class="notes-open ' + (f.notes ? "has" : "") + '" data-act="notes">' + (f.notes ? "✓ note" : "+ add") + '</button>';
    }
    let opts = "";
    if (t.kind === "single") {
      // Most-used option first (cached); duration stays in numeric order below.
      opts = byUsage(t.opts, t.field, function (o) { return o.value; }).map(function (o) {
        return '<button class="mini ' + (f[t.field] === o.value ? "on" : "") + '" data-act="single" data-val="' + o.value + '">' + o.label + '</button>';
      }).join("");
    } else if (t.kind === "flags") {
      const group = MOTOR_FLAGS.filter(function (m) { return m.group === t.group; });
      opts = byUsage(group, "motor", function (m) { return m.key; }).map(function (m) {
        return '<button class="mini ' + (f[m.key] ? "on" : "") + '" data-act="flag" data-key="' + m.key + '">' + m.label + '</button>';
      }).join("");
    } else if (t.kind === "duration") {
      const presets = isSymptom(f) ? LONG_DUR_PRESETS : DUR_PRESETS;
      opts = presets.map(function (s) {
        return '<button class="mini ' + (f.durationSeconds === s ? "on" : "") + '" data-act="dur" data-dur="' + s + '">' + fmtDuration(s) + '</button>';
      }).join("");
    } else if (t.kind === "triggers") {
      opts = byUsage(triggerVocab, "triggers", function (tr) { return tr; }).map(function (tr) {
        return '<button class="mini ' + (f.triggers.indexOf(tr) >= 0 ? "on" : "") + '" data-act="trig" data-trig="' + esc(tr) + '">' + esc(tr) + '</button>';
      }).join("") + '<button class="mini add" data-act="trigadd">+ Add</button>';
    }
    return '<span class="cube-label">' + t.label + '</span><div class="cube-opts">' + opts + '</div>';
  }

  // Show the fade+chevron cue only when chips overflow and we're not at the bottom.
  function updateScrollCue(cube) {
    const opts = cube.querySelector(".cube-opts");
    if (!opts) { cube.classList.remove("more"); return; }
    const more = opts.scrollHeight - opts.clientHeight > 2 &&
      opts.scrollTop + opts.clientHeight < opts.scrollHeight - 2;
    cube.classList.toggle("more", more);
  }

  function renderCubes() {
    if (!currentFit) return;
    LOG_TILES.forEach(function (t) {
      if (!t) return;
      const cube = logGrid.querySelector('[data-tile="' + t.id + '"]');
      if (!cube) return;
      cube.innerHTML = cubeInnerHtml(t);
      cube.querySelectorAll("[data-act]").forEach(function (b) {
        b.addEventListener("click", function (ev) { ev.stopPropagation(); handleAct(t, b.dataset.act, b); });
      });
      const opts = cube.querySelector(".cube-opts");
      if (opts) opts.addEventListener("scroll", function () { updateScrollCue(cube); });
      updateScrollCue(cube);   // synchronous: grid is laid out, scrollHeight is accurate
    });
    // A rAF pass refines the measurement once fonts/layout fully settle (no-op if it
    // matches). Synchronous pass above guarantees the cue even if rAF is throttled.
    requestAnimationFrame(function () {
      LOG_TILES.forEach(function (t) {
        if (!t) return;
        const cube = logGrid.querySelector('[data-tile="' + t.id + '"]');
        if (cube) updateScrollCue(cube);
      });
    });
  }

  function handleAct(t, act, b) {
    const f = currentFit;
    if (!f) return;
    if (act === "time") { openTimePicker(f.ts, function (ts) { f.ts = ts; saveFit(); updateTodayCount(); renderCubes(); }); return; }
    if (act === "notes") { openNotes(); return; }
    if (act === "single") {
      if (t.field === "environment") f.environment = (f.environment === b.dataset.val ? null : b.dataset.val);
      else f[t.field] = b.dataset.val;
    } else if (act === "flag") {
      const k = b.dataset.key; f[k] = !f[k];
    } else if (act === "dur") {
      const s = +b.dataset.dur; f.durationSeconds = (f.durationSeconds === s ? null : s);
    } else if (act === "trig") {
      const tr = b.dataset.trig, i = f.triggers.indexOf(tr);
      if (i >= 0) f.triggers.splice(i, 1); else f.triggers.push(tr);
    } else if (act === "trigadd") {
      const tr = (prompt("New trigger:") || "").trim();
      if (!tr) return;
      if (triggerVocab.indexOf(tr) < 0) { triggerVocab.push(tr); persistTriggers(); }
      if (f.triggers.indexOf(tr) < 0) f.triggers.push(tr);
    }
    saveFit(); updateTodayCount(); renderCubes();
  }

  // ---- Notes (the one field that still needs a sheet) ----
  const tilePanel = document.getElementById("tilePanel");
  const tilePanelBackdrop = document.getElementById("tilePanel-backdrop");
  function openNotes() {
    if (!currentFit) return;
    tilePanel.innerHTML = '<div class="sheet-grab"></div><div class="tp-panel-head">Notes</div>' +
      '<div class="field"><textarea id="tpNotes" placeholder="Anything else worth remembering…">' + esc(currentFit.notes || "") + '</textarea></div>' +
      '<button class="btn ghost" id="tpDone">Done</button>';
    tilePanel.querySelector("#tpNotes").addEventListener("input", function (e) { currentFit.notes = e.target.value; saveFit(); });
    tilePanel.querySelector("#tpDone").addEventListener("click", closeNotes);
    tilePanelBackdrop.classList.add("show");
    tilePanel.classList.add("show");
  }
  function closeNotes() {
    tilePanelBackdrop.classList.remove("show");
    tilePanel.classList.remove("show");
    if (currentFit) renderCubes();
  }
  tilePanelBackdrop.addEventListener("click", closeNotes);

  function saveFit() {
    if (!currentFit) return;
    currentFit.updatedAt = Date.now();
    persistFits(); markDirty(currentFit.id);
  }

  // ---- Default a new episode to the previous one's tags ----
  function lastEpisodeBefore(cur) {
    const list = active().filter(function (f) { return !cur || f.id !== cur.id; });
    if (!list.length) return null;
    return list.slice().sort(function (a, b) { return b.ts - a.ts; })[0];
  }
  // Seed a freshly-created fit with the previous episode's tags so logging a
  // recurring episode is a single tap (the user can override any cube after).
  function inheritFromLast(fit) {
    const prev = lastEpisodeBefore(fit);
    if (!prev) return;
    fit.speech = prev.speech;
    MOTOR_FLAGS.forEach(function (m) { fit[m.key] = !!prev[m.key]; });
    fit.environment = prev.environment;
    fit.durationSeconds = prev.durationSeconds;
    fit.triggers = (prev.triggers || []).slice();
    saveFit();
  }

  function createFit(ts) {
    const fit = {
      id: uid(), ts: ts,
      lat: null, lng: null, acc: null,
      tempC: null, apparentC: null, humidity: null, weatherCode: null,
      speech: "normal", spitting: false, dribbling: false, mouthClick: false, mouthPop: false, laughing: false, arm: false, legs: false, head: false, environment: "home",
      durationSeconds: null, recoverySeconds: null, count: 1, triggers: [], notes: "",
      by: deviceName || null,
      updatedAt: Date.now(),
    };
    fits.push(fit);
    persistFits();
    markDirty(fit.id);
    captureLocation(fit);
    currentFit = fit;
    return fit;
  }

  function logNewFit() {
    const fit = createFit(Date.now());  // sets currentFit
    inheritFromLast(fit);               // default to last episode's tags
    activate();
    updateTodayCount();
    showToast("Logged " + fmt24(fit.ts));
    if (navigator.vibrate) navigator.vibrate(30);
  }

  let toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 1600);
  }

  function startOfDay(ts) { const d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime(); }
  function fitCount(f) { return Math.max(1, (f && f.count) || 1); }
  function isSymptom(f) { return !!f && f.count === 0; }
  function fitsActive() { return active().filter(function (f) { return !isSymptom(f); }); }
  function symptomsActive() { return active().filter(isSymptom); }
  function sumCount(list) { return list.reduce(function (a, f) { return a + fitCount(f); }, 0); }
  function updateTodayCount() {
    const el = document.getElementById("logStatus");
    const txt = el.querySelector(".ls-text");
    const list = active();
    if (!list.length) { el.hidden = true; return; }
    const today = startOfDay(Date.now());
    const n = sumCount(fitsActive().filter(function (f) { return startOfDay(f.ts) === today; }));
    const last = list.slice().sort(function (a, b) { return b.ts - a.ts; })[0];
    txt.textContent = n + " logged · " + fmtDayHead(last.ts) + " " + fmt24(last.ts);
    el.onclick = function () { switchTab("review"); openEditor(last.id); };
    el.hidden = false;
  }

  // ---------------- Formatting ----------------
  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  }
  function fmt24(ts) {
    const d = new Date(ts), p = function (n) { return n < 10 ? "0" + n : "" + n; };
    return p(d.getHours()) + ":" + p(d.getMinutes());
  }
  function fmtDayHead(ts) {
    const d = new Date(ts), today = startOfDay(Date.now()), yday = today - 86400000;
    const s = startOfDay(ts);
    if (s === today) return "Today";
    if (s === yday) return "Yesterday";
    return d.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });
  }
  const SPEECH_LBL = { normal: "OK", slurred: "Slurred", disturbed: "Disturbed", apraxic: "Disturbed", none: "None" };
  function fmtDuration(sec) {
    if (sec == null) return null;
    if (sec < 60) return sec + "s";
    if (sec >= 3600) {
      const h = Math.floor(sec / 3600), rm = Math.round((sec % 3600) / 60);
      return rm ? h + "h " + rm + "m" : h + "h";
    }
    const m = Math.floor(sec / 60), s = sec % 60;
    return s ? m + "m " + s + "s" : m + "m";
  }

  // ---------------- Review screen ----------------
  const reviewList = document.getElementById("reviewList");
  function renderReview() {
    const list = active();
    if (!list.length) {
      reviewList.innerHTML = '<div class="empty">No fits logged yet.<br>Tap the big <b>LOG</b> button to start.</div>';
      return;
    }
    const sorted = list.slice().sort(function (a, b) { return b.ts - a.ts; });
    let html = "", lastDay = null;
    sorted.forEach(function (f) {
      const dayKey = startOfDay(f.ts);
      if (dayKey !== lastDay) {
        const sameDay = sorted.filter(function (x) { return startOfDay(x.ts) === dayKey; });
        const count = sumCount(sameDay.filter(function (x) { return !isSymptom(x); }));
        const symN = sameDay.filter(isSymptom).length;
        let head = count + ' fit' + (count === 1 ? "" : "s");
        if (symN) head += ' &middot; ' + symN + ' symptom' + (symN > 1 ? "s" : "");
        html += '<div class="day-head">' + fmtDayHead(f.ts) + ' &middot; ' + head + '</div>';
        lastDay = dayKey;
      }
      html += fitRowHtml(f);
    });
    reviewList.innerHTML = html;
    reviewList.querySelectorAll("[data-fit]").forEach(function (el) {
      el.addEventListener("click", function () { openEditor(el.dataset.fit); });
    });
    reviewList.querySelectorAll(".fit-row .meta").forEach(function (m) { clampMetaRows(m, 2); });
  }

  // Keep each fit's tag list to `maxRows` rows so cards stay scannable. Pills beyond the
  // limit are hidden and replaced by a "+N" chip that's guaranteed to sit on the last row.
  function clampMetaRows(meta, maxRows) {
    const pills = Array.prototype.slice.call(meta.querySelectorAll(".pill"));
    if (pills.length < 2) return;
    const rowTops = [];
    pills.forEach(function (p) { if (rowTops.indexOf(p.offsetTop) < 0) rowTops.push(p.offsetTop); });
    if (rowTops.length <= maxRows) return;     // already fits (or layout not measurable yet)
    rowTops.sort(function (a, b) { return a - b; });
    const cutoff = rowTops[maxRows];           // y of the first row we must not show
    let hidden = 0;
    pills.forEach(function (p) { if (p.offsetTop >= cutoff) { p.style.display = "none"; hidden++; } });
    const chip = document.createElement("span");
    chip.className = "pill more-pills";
    chip.textContent = "+" + hidden;
    meta.appendChild(chip);
    // Appending the chip may push it onto a new row — trim trailing visible pills until it fits.
    let visible = pills.filter(function (p) { return p.style.display !== "none"; });
    while (visible.length && chip.offsetTop >= cutoff) {
      visible.pop().style.display = "none";
      hidden++;
      chip.textContent = "+" + hidden;
    }
  }
  function fitRowHtml(f) {
    const symptom = isSymptom(f);
    const pills = [];
    if (!(symptom && f.speech === "normal")) pills.push('<span class="pill speech">' + SPEECH_LBL[f.speech] + '</span>');
    MOTOR_FLAGS.forEach(function (m) { if (f[m.key]) pills.push('<span class="pill ' + m.group + '">' + m.label + '</span>'); });
    if (f.environment) pills.push('<span class="pill env">' + cap(f.environment) + '</span>');
    if (f.durationSeconds != null) pills.push('<span class="pill dur">' + fmtDuration(f.durationSeconds) + '</span>');
    if (!symptom && f.recoverySeconds != null) pills.push('<span class="pill dur">recovery ' + fmtDuration(f.recoverySeconds) + '</span>');
    (f.triggers || []).forEach(function (t) { pills.push('<span class="pill trig">' + esc(t) + '</span>'); });
    if (f.lat != null) pills.push('<span class="pill">GPS</span>');
    if (hasWeather(f)) pills.push('<span class="pill wx">' + weatherEmoji(f.weatherCode) + ' ' + fmtTemp(f.tempC) + '</span>');
    if (f.by) pills.push('<span class="pill by">by ' + esc(f.by) + '</span>');
    const badge = symptom
      ? '<span class="count-badge symptom">Symptom</span>'
      : (fitCount(f) > 1 ? '<span class="count-badge">&times;' + fitCount(f) + '</span>' : '');
    return '<div class="card"><div class="fit-row" data-fit="' + f.id + '">' +
      '<div><div class="time">' + fmtTime(f.ts) + badge + '</div><div class="meta">' + pills.join("") + '</div></div>' +
      '<div class="chev">&rsaquo;</div></div></div>';
  }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  // ---------------- Editor sheet ----------------
  const backdrop = document.getElementById("sheet-backdrop");
  const sheet = document.getElementById("sheet");
  const DUR_PRESETS = [10, 30, 60, 120, 300, 600];
  const LONG_DUR_PRESETS = [900, 1800, 3600, 7200, 10800, 18000, 28800, 43200]; // 15m,30m,1h,2h,3h,5h,8h,12h
  let editingId = null;

  function openEditor(id) {
    const f = fits.find(function (x) { return x.id === id; });
    if (!f) return;
    editingId = id;
    sheet.innerHTML = editorHtml(f);
    wireEditor(f);
    backdrop.classList.add("show");
    sheet.classList.add("show");
  }
  function closeEditor() {
    backdrop.classList.remove("show");
    sheet.classList.remove("show");
    editingId = null;
  }
  backdrop.addEventListener("click", closeEditor);

  function editorHtml(f) {
    const symptom = isSymptom(f);
    const durPresets = symptom ? LONG_DUR_PRESETS : DUR_PRESETS;
    const durChips = durPresets.map(function (s) {
      return '<button class="chip dur-chip ' + (f.durationSeconds === s ? "on" : "") + '" data-dur="' + s + '">' + fmtDuration(s) + '</button>';
    }).join("");
    // Custom (non-preset) duration → show a removable pill so it's visible.
    const durIsCustom = f.durationSeconds != null && durPresets.indexOf(f.durationSeconds) < 0;
    const customDurChip = durIsCustom
      ? '<button class="chip dur-custom-chip on" id="durCustomChip" title="Remove custom duration">' + fmtDuration(f.durationSeconds) + '<span class="chip-x">&times;</span></button>'
      : "";
    const recChips = LONG_DUR_PRESETS.map(function (s) {
      return '<button class="chip rec-chip ' + (f.recoverySeconds === s ? "on" : "") + '" data-rec="' + s + '">' + fmtDuration(s) + '</button>';
    }).join("");
    const trigChips = triggerVocab.map(function (t) {
      return '<button class="chip trig-chip ' + (f.triggers.indexOf(t) >= 0 ? "on" : "") + '" data-trig="' + esc(t) + '">' + esc(t) + '</button>';
    }).join("");
    const speechChips = SPEECH_OPTS.map(function (o) {
      return '<button class="chip sp-chip ' + (f.speech === o.value || (o.value === "disturbed" && f.speech === "apraxic") ? "on" : "") + '" data-speech="' + o.value + '">' + o.label + '</button>';
    }).join("");
    const envChips = ENV_OPTS.map(function (o) {
      return '<button class="chip env-chip ' + (f.environment === o.value ? "on" : "") + '" data-env="' + o.value + '">' + o.label + '</button>';
    }).join("");
    function motorGroupChips(group) {
      return MOTOR_FLAGS.filter(function (m) { return m.group === group; }).map(function (m) {
        return '<button class="chip motor-chip ' + (f[m.key] ? "on" : "") + '" data-motor="' + m.key + '">' + m.label + '</button>';
      }).join("");
    }
    return '<div class="sheet-grab"></div>' +
      '<button class="editor-time" id="editTime">' + fmtDayHead(f.ts) + ' &middot; ' + fmt24(f.ts) + '<span class="edit-hint">&#9998; edit</span></button>' +
      '<div class="field"><label>' + (symptom ? "Number of fits — 0 = symptom episode (no fit)" : "Number of fits") + '</label><div class="stepper">' +
        '<button class="step-btn" id="countMinus" aria-label="Fewer">&minus;</button>' +
        '<b id="countVal">' + f.count + '</b>' +
        '<button class="step-btn" id="countPlus" aria-label="More">+</button></div></div>' +
      '<div class="field cat-speech"><label>Speech</label><div class="chips">' + speechChips + '</div></div>' +
      '<div class="field cat-oral"><label>Oral</label><div class="chips">' + motorGroupChips("oral") + '</div></div>' +
      '<div class="field cat-involuntary"><label>Involuntary</label><div class="chips">' + motorGroupChips("involuntary") + '</div></div>' +
      '<div class="field cat-where"><label>Environment</label><div class="chips">' + envChips + '</div></div>' +
      '<div class="field"><label>' + (symptom ? "Symptom length" : "Duration") + '</label><div class="chips">' + durChips + customDurChip +
        '<button class="chip add" id="durCustom">Custom…</button></div></div>' +
      (symptom ? "" :
        '<div class="field"><label>Recovery (symptoms after fit)</label><div class="chips">' + recChips +
        '<button class="chip add" id="recClear">Clear</button></div></div>') +
      '<div class="field cat-triggers"><label>Suspected triggers</label><div class="chips">' + trigChips +
        '<button class="chip add" id="trigAdd">+ Add</button></div></div>' +
      '<div class="field"><label>Notes</label><textarea id="notesBox" placeholder="Anything else worth remembering…">' + esc(f.notes || "") + '</textarea></div>' +
      (hasWeather(f)
        ? '<div class="field"><label>Weather</label><div class="wx-line">' + weatherEmoji(f.weatherCode) + ' ' +
            esc(weatherLabel(f.weatherCode)) + ' &middot; ' + fmtTemp(f.tempC) +
            (f.apparentC != null ? ' (feels ' + fmtTemp(f.apparentC) + ')' : '') +
            (f.humidity != null ? ' &middot; ' + f.humidity + '% humidity' : '') + '</div></div>'
        : "") +
      '<div class="btn-row"><button class="btn ghost" id="doneBtn">Done</button>' +
      '<button class="btn danger" id="delBtn" style="flex:0 0 auto">Delete</button></div>';
  }

  function wireEditor(f) {
    sheet.querySelector("#editTime").addEventListener("click", function () {
      openTimePicker(f.ts, function (ts) { f.ts = ts; touch(f); reopen(f); });
    });
    function setCount(n) { f.count = Math.max(0, n); touch(f); reopen(f); }
    sheet.querySelector("#countMinus").addEventListener("click", function () { setCount(f.count - 1); });
    sheet.querySelector("#countPlus").addEventListener("click", function () { setCount(f.count + 1); });
    sheet.querySelectorAll(".sp-chip").forEach(function (b) {
      b.addEventListener("click", function () { f.speech = b.dataset.speech; touch(f); reopen(f); });
    });
    sheet.querySelectorAll(".env-chip").forEach(function (b) {
      b.addEventListener("click", function () { f.environment = (f.environment === b.dataset.env ? null : b.dataset.env); touch(f); reopen(f); });
    });
    sheet.querySelectorAll(".motor-chip").forEach(function (b) {
      b.addEventListener("click", function () { const k = b.dataset.motor; f[k] = !f[k]; touch(f); reopen(f); });
    });
    sheet.querySelectorAll(".dur-chip").forEach(function (b) {
      b.addEventListener("click", function () { const s = +b.dataset.dur; f.durationSeconds = (f.durationSeconds === s ? null : s); touch(f); reopen(f); });
    });
    sheet.querySelector("#durCustom").addEventListener("click", function () {
      const v = prompt("Duration in seconds:", f.durationSeconds || "");
      if (v !== null && v !== "" && !isNaN(+v)) { f.durationSeconds = Math.max(0, Math.round(+v)); touch(f); reopen(f); }
    });
    const durCustomChip = sheet.querySelector("#durCustomChip");
    if (durCustomChip) durCustomChip.addEventListener("click", function () { f.durationSeconds = null; touch(f); reopen(f); });
    sheet.querySelectorAll(".rec-chip").forEach(function (b) {
      b.addEventListener("click", function () { const s = +b.dataset.rec; f.recoverySeconds = (f.recoverySeconds === s ? null : s); touch(f); reopen(f); });
    });
    const recClearBtn = sheet.querySelector("#recClear");
    if (recClearBtn) recClearBtn.addEventListener("click", function () { f.recoverySeconds = null; touch(f); reopen(f); });
    sheet.querySelectorAll(".trig-chip").forEach(function (b) {
      b.addEventListener("click", function () {
        const t = b.dataset.trig, i = f.triggers.indexOf(t);
        if (i >= 0) f.triggers.splice(i, 1); else f.triggers.push(t);
        touch(f); reopen(f);
      });
    });
    sheet.querySelector("#trigAdd").addEventListener("click", function () {
      const t = (prompt("New trigger:") || "").trim();
      if (t) {
        if (triggerVocab.indexOf(t) < 0) { triggerVocab.push(t); persistTriggers(); }
        if (f.triggers.indexOf(t) < 0) f.triggers.push(t);
        touch(f); reopen(f);
      }
    });
    sheet.querySelector("#notesBox").addEventListener("input", function (e) { f.notes = e.target.value; f.updatedAt = Date.now(); persistFits(); markDirty(f.id); });
    sheet.querySelector("#doneBtn").addEventListener("click", closeEditor);
    sheet.querySelector("#delBtn").addEventListener("click", function () {
      if (confirm("Delete this fit?")) {
        f.deleted = true; f.updatedAt = Date.now();
        persistFits(); markDirty(f.id); closeEditor(); renderReview(); updateTodayCount();
      }
    });
  }
  function touch(f) { f.updatedAt = Date.now(); persistFits(); markDirty(f.id); renderReview(); updateTodayCount(); }
  function reopen(f) { sheet.innerHTML = editorHtml(f); wireEditor(f); }

  function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]; }); }

  // ---------------- Time picker (drum/wheel) ----------------
  const tpBackdrop = document.getElementById("tp-backdrop");
  const tpEl = document.getElementById("tp");
  const TP_ROW_H = 48;
  const TP_MIN_STEP = 5;
  let tpConfirmCb = null;

  function tpOptList(values) {
    return '<div class="tp-spacer"></div>' +
      values.map(function (v) { return '<div class="tp-opt">' + (v < 10 ? "0" + v : v) + '</div>'; }).join("") +
      '<div class="tp-spacer"></div>';
  }

  function openTimePicker(initialTs, onConfirm) {
    tpConfirmCb = onConfirm;
    const d = new Date(initialTs);
    const h24 = d.getHours();
    let min = Math.round(d.getMinutes() / TP_MIN_STEP) * TP_MIN_STEP;
    if (min >= 60) min = 60 - TP_MIN_STEP;
    let dayOff = startOfDay(initialTs) <= startOfDay(Date.now()) - 86400000 ? 1 : 0; // 1 = yesterday

    const hours = []; for (let i = 0; i <= 23; i++) hours.push(i);
    const mins = []; for (let i = 0; i < 60; i += TP_MIN_STEP) mins.push(i);

    tpEl.innerHTML =
      '<div class="sheet-grab"></div>' +
      '<div class="tp-label" id="tpLabel"></div>' +
      '<div class="tp-wheels">' +
        '<div class="tp-wheel" id="tpHour">' + tpOptList(hours) + '</div>' +
        '<div class="tp-colon">:</div>' +
        '<div class="tp-wheel" id="tpMin">' + tpOptList(mins) + '</div>' +
      '</div>' +
      '<div class="tp-pills" id="tpDay">' +
        '<button class="tp-pill" data-day="0">Today</button>' +
        '<button class="tp-pill" data-day="1">Yesterday</button></div>' +
      '<div class="btn-row"><button class="btn ghost" id="tpCancel">Cancel</button>' +
        '<button class="btn" id="tpConfirm">Confirm</button></div>';

    const hourWheel = tpEl.querySelector("#tpHour");
    const minWheel = tpEl.querySelector("#tpMin");
    const label = tpEl.querySelector("#tpLabel");

    function selIndex(wheel) {
      return Math.max(0, Math.round(wheel.scrollTop / TP_ROW_H));
    }
    function markSel(wheel) {
      const idx = selIndex(wheel);
      const opts = wheel.querySelectorAll(".tp-opt");
      opts.forEach(function (o, i) { o.classList.toggle("sel", i === idx); });
    }
    function curHour() { return hours[Math.min(hours.length - 1, selIndex(hourWheel))]; }
    function curMin() { return mins[Math.min(mins.length - 1, selIndex(minWheel))]; }

    function composeTs() {
      const base = new Date(); base.setHours(0, 0, 0, 0);
      base.setDate(base.getDate() - dayOff);
      base.setHours(curHour(), curMin(), 0, 0);
      let t = base.getTime();
      if (t > Date.now()) t = Date.now();
      return t;
    }
    function updateLabel() {
      markSel(hourWheel); markSel(minWheel);
      const t = composeTs();
      label.textContent = fmtDayHead(t) + " " + fmt24(t);
    }
    function setPills() {
      tpEl.querySelectorAll("#tpDay .tp-pill").forEach(function (b) { b.classList.toggle("on", +b.dataset.day === dayOff); });
    }

    let scrollTimer;
    function onScroll() { clearTimeout(scrollTimer); scrollTimer = setTimeout(updateLabel, 60); }
    hourWheel.addEventListener("scroll", onScroll);
    minWheel.addEventListener("scroll", onScroll);

    tpEl.querySelectorAll("#tpDay .tp-pill").forEach(function (b) {
      b.addEventListener("click", function () { dayOff = +b.dataset.day; setPills(); updateLabel(); });
    });
    tpEl.querySelector("#tpCancel").addEventListener("click", closeTimePicker);
    tpEl.querySelector("#tpConfirm").addEventListener("click", function () {
      const ts = composeTs(); const cb = tpConfirmCb; closeTimePicker(); if (cb) cb(ts);
    });

    tpBackdrop.classList.add("show");
    tpEl.classList.add("show");
    setPills();
    hourWheel.scrollTop = h24 * TP_ROW_H;
    minWheel.scrollTop = (min / TP_MIN_STEP) * TP_ROW_H;
    updateLabel();
  }

  function closeTimePicker() {
    tpBackdrop.classList.remove("show");
    tpEl.classList.remove("show");
    tpConfirmCb = null;
  }
  tpBackdrop.addEventListener("click", closeTimePicker);

  // ---------------- Insights ----------------
  // Extreme-outlier detection (Tukey 3×IQR fences) so a single mistyped
  // duration or a freak day doesn't skew averages or squash the charts.
  // User-toggleable (on by default); persisted so the choice sticks.
  let outliersOn = localStorage.getItem("fitful.outliers") !== "0";
  function quantile(sorted, q) {
    if (!sorted.length) return 0;
    const pos = (sorted.length - 1) * q, base = Math.floor(pos), rest = pos - base;
    return sorted[base + 1] !== undefined
      ? sorted[base] + rest * (sorted[base + 1] - sorted[base])
      : sorted[base];
  }
  function outlierFence(values) {
    if (!outliersOn) return null;             // toggle off → keep every point
    const v = values.filter(function (x) { return x != null && !isNaN(x); })
      .slice().sort(function (a, b) { return a - b; });
    if (v.length < 4) return null;            // too few points to judge
    const q1 = quantile(v, 0.25), q3 = quantile(v, 0.75), iqr = q3 - q1;
    if (iqr > 0) return { lo: q1 - 3 * iqr, hi: q3 + 3 * iqr };   // Tukey 3×IQR
    // Degenerate low-variance data (e.g. most days are 0–1 fits) collapses the
    // IQR to zero, so a genuine spike would escape. Fall back to a robust spread
    // (scaled MAD, then mean abs deviation) so extreme points are still caught.
    const med = quantile(v, 0.5);
    const dev = v.map(function (x) { return Math.abs(x - med); })
      .sort(function (a, b) { return a - b; });
    const mad = quantile(dev, 0.5);
    let scale = mad > 0 ? 1.4826 * mad : 0;
    if (scale === 0) {
      const mean = v.reduce(function (a, x) { return a + x; }, 0) / v.length;
      const meanAbs = v.reduce(function (a, x) { return a + Math.abs(x - mean); }, 0) / v.length;
      scale = meanAbs > 0 ? 1.2533 * meanAbs : 0;
    }
    if (scale === 0) return null;             // every value identical
    const k = 4.5;                            // ≈ extreme threshold (modified z-score)
    return { lo: med - k * scale, hi: med + k * scale };
  }
  function dropOutliers(values) {
    const f = outlierFence(values);
    if (!f) return values.slice();
    return values.filter(function (x) { return x >= f.lo && x <= f.hi; });
  }

  function renderInsights() {
    const body = document.getElementById("insightsBody");
    const list = active();
    if (!list.length) {
      body.innerHTML = '<div class="empty">No data yet.<br>Your patterns will appear here once you log a few fits.</div>';
      return;
    }
    const fitsList = fitsActive();
    const symList = symptomsActive();

    // --- Exclude extreme outliers (3×IQR) from every stat AND chart ---
    // Outliers are defined once, at the record level (by fit count), and removed from all
    // aggregation just like the stats. Affected days/hours still get an orange tick so a
    // freak record isn't silently hidden.
    let excluded = 0;
    const countFence = outlierFence(fitsList.map(fitCount));
    function isCountOutlier(f) { return !!countFence && (fitCount(f) < countFence.lo || fitCount(f) > countFence.hi); }
    const fitOutliers = fitsList.filter(isCountOutlier);
    const cleanFits = fitsList.filter(function (f) { return !isCountOutlier(f); });
    excluded += fitOutliers.length;
    const total = sumCount(cleanFits);
    const days = new Set(list.map(function (f) { return startOfDay(f.ts); })).size;
    const perDay = (total / Math.max(1, days)).toFixed(1);
    // Duration outliers (e.g. a mistyped length) skew average length.
    const durAll = fitsList.filter(function (f) { return f.durationSeconds != null; })
      .map(function (f) { return f.durationSeconds; });
    const durVals = dropOutliers(durAll);
    excluded += durAll.length - durVals.length;
    const avgDur = durVals.length
      ? Math.round(durVals.reduce(function (a, s) { return a + s; }, 0) / durVals.length)
      : null;

    let html = '<div class="outlier-toggle' + (outliersOn ? " on" : "") + '" id="outlierToggle" role="switch" aria-checked="' + outliersOn + '">' +
      '<span class="lbl">Remove extreme outliers<small>Excludes 3×IQR extremes from averages, totals &amp; charts</small></span>' +
      '<span class="sw"></span></div>';

    html += '<div class="stat-row">' +
      '<div class="stat"><b>' + total + '</b><span>TOTAL FITS</span></div>' +
      '<div class="stat"><b>' + perDay + '</b><span>PER DAY</span></div>' +
      '<div class="stat"><b>' + (avgDur != null ? fmtDuration(avgDur) : "–") + '</b><span>AVG LENGTH</span></div>' +
      '<div class="stat"><b>' + symList.length + '</b><span>SYMPTOM EPISODES</span></div>' +
      '</div>';
    if (excluded > 0) {
      html += '<div class="outlier-note">Excludes ' + excluded + ' extreme outlier' +
        (excluded === 1 ? '' : 's') + ' (3×IQR) from all stats &amp; charts.</div>';
    }

    html += '<div class="chart-card"><div class="title">Frequency</div><div class="sub">Fits per day, last 14 days</div>' + barChartDays(cleanFits, true) + '</div>';
    html += '<div class="chart-card"><div class="title">Time of day</div><div class="sub">When fits tend to happen</div>' + barChartHours(cleanFits) + '</div>';
    if (symList.length) {
      html += '<div class="chart-card"><div class="title">Symptoms — frequency</div><div class="sub">Symptom episodes per day, last 14 days</div>' + barChartDays(symList, false) + '</div>';
      html += '<div class="chart-card"><div class="title">Symptom types</div><div class="sub">Share of symptom episodes with each tag</div>' + hbars(symptomTypeRows(symList), "No symptoms tagged on episodes yet.", symList.length) + '</div>';
    }
    const totalFitsAll = sumCount(cleanFits);
    html += '<div class="chart-card"><div class="title">Triggers</div><div class="sub">Share of fits tagged with each trigger</div>' + hbars(countBy(function (f) { return f.triggers; }, cleanFits), "No triggers tagged yet — add them in Review.", totalFitsAll) + '</div>';
    html += '<div class="chart-card"><div class="title">Environment</div><div class="sub">Share of fits in each environment</div>' + hbars(countBy(function (f) { return f.environment ? [cap(f.environment)] : []; }, cleanFits), "No environment tagged yet.", totalFitsAll) + '</div>';

    html += '<div id="corrSection">' + corrSectionHTML() + '</div>';

    const needWeather = active().filter(function (f) { return f.lat != null && f.lng != null && !hasWeather(f); }).length;
    html += '<h2>Export &amp; backup</h2><div class="card">' +
      '<div class="btn-row" style="margin-bottom:10px"><button class="btn" id="shareBtn">Share</button>' +
      '<button class="btn ghost" id="copyBtn">Copy text</button></div>' +
      '<div class="btn-row"><button class="btn ghost" id="csvBtn">CSV</button>' +
      '<button class="btn ghost" id="jsonBtn">JSON</button></div>' +
      (needWeather
        ? '<div class="btn-row" style="margin-top:10px"><button class="btn ghost" id="backfillBtn">Backfill weather (' + needWeather + ')</button></div>'
        : "") +
      '</div>';

    body.innerHTML = html;
    document.getElementById("outlierToggle").addEventListener("click", function () {
      outliersOn = !outliersOn;
      localStorage.setItem("fitful.outliers", outliersOn ? "1" : "0");
      renderInsights();
    });
    document.getElementById("shareBtn").addEventListener("click", doShare);
    document.getElementById("copyBtn").addEventListener("click", doCopy);
    document.getElementById("csvBtn").addEventListener("click", function () { downloadFile(buildCSV(), "fitful.csv", "text/csv"); });
    document.getElementById("jsonBtn").addEventListener("click", function () { downloadFile(JSON.stringify(active(), null, 2), "fitful.json", "application/json"); });
    const backfillBtn = document.getElementById("backfillBtn");
    if (backfillBtn) backfillBtn.addEventListener("click", backfillWeather);
    bindCorrEvents();
    ensureDayTemps();
  }

  function countBy(extractFn, list) {
    const m = {};
    (list || active()).forEach(function (f) { const c = fitCount(f); (extractFn(f) || []).forEach(function (k) { m[k] = (m[k] || 0) + c; }); });
    return Object.keys(m).map(function (k) { return { label: k, value: m[k] }; }).sort(function (a, b) { return b.value - a.value; });
  }
  // denom = the total each row is a share of (e.g. total fits). When omitted,
  // bars fall back to scaling against the largest row (relative ranking).
  function hbars(rows, emptyMsg, denom) {
    if (!rows.length) return '<div style="color:var(--muted);font-size:13px">' + emptyMsg + '</div>';
    const base = denom || rows[0].value || 1;
    return rows.map(function (r) {
      const pct = Math.round((r.value / base) * 100);
      const w = Math.max(0, Math.min(100, pct));
      return '<div class="hbar-row"><span class="lbl">' + esc(r.label) + '</span>' +
        '<span class="hbar-track"><span class="hbar-fill" style="width:' + w + '%"></span></span>' +
        '<span class="val" title="' + r.value + ' of ' + base + '">' + pct + '%</span></div>';
    }).join("");
  }
  function barChartDays(list, useCount) {
    const today = startOfDay(Date.now());
    const labels = [], vals = [];
    for (let i = 13; i >= 0; i--) {
      const day = today - i * 86400000;
      labels.push(new Date(day).toLocaleDateString([], { day: "numeric" }));
      const sameDay = list.filter(function (f) { return startOfDay(f.ts) === day; });
      vals.push(useCount ? sumCount(sameDay) : sameDay.length);
    }
    return svgBars(labels, vals, function (i) { return i % 2 === 0; });
  }
  function barChartHours(list) {
    const vals = new Array(24).fill(0);
    (list || fitsActive()).forEach(function (f) { vals[new Date(f.ts).getHours()] += fitCount(f); });
    const labels = vals.map(function (_, h) { return h; });
    return svgBars(labels, vals, function (i) { return i % 6 === 0; }, function (h) { return h + "h"; });
  }
  function symptomTypeRows(list) {
    const m = {};
    list.forEach(function (f) {
      MOTOR_FLAGS.forEach(function (mf) { if (f[mf.key]) m[mf.label] = (m[mf.label] || 0) + 1; });
      if (f.speech === "disturbed" || f.speech === "apraxic") m["Disturbed"] = (m["Disturbed"] || 0) + 1;
    });
    return Object.keys(m).map(function (k) { return { label: k, value: m[k] }; }).sort(function (a, b) { return b.value - a.value; });
  }
  function svgBars(labels, vals, showLabelFn, labelFmt) {
    const W = 320, H = 130, padB = 18, padT = 16, n = vals.length;
    const usable = H - padB - padT;
    // Outlier records are removed upstream, so the chart simply plots the clean data
    // against its true max.
    const max = Math.max(1, Math.max.apply(null, vals.concat(0)));
    const gap = 3, bw = (W - gap * (n - 1)) / n;
    let bars = "";
    vals.forEach(function (v, i) {
      const h = v === 0 ? 0 : Math.max(2, (v / max) * usable);
      const x = i * (bw + gap), y = H - padB - h;
      if (v) bars += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + h.toFixed(1) + '" rx="2" fill="#5b8cff"></rect>';
      if (v) bars += '<text class="axis" x="' + (x + bw / 2).toFixed(1) + '" y="' + (y - 3).toFixed(1) + '" text-anchor="middle" fill="#9aa3bd">' + v + '</text>';
      if (showLabelFn(i)) bars += '<text class="axis" x="' + (x + bw / 2).toFixed(1) + '" y="' + (H - 5) + '" text-anchor="middle">' + (labelFmt ? labelFmt(labels[i]) : labels[i]) + '</text>';
    });
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" height="130">' + bars + '</svg>';
  }

  // ---------------- Correlation explorer (Insights) ----------------
  // One configurable chart + an auto-surfaced "notable patterns" panel. Reuses svgBars/hbars
  // and the existing outlier logic. Temperature uses a backfilled daily-mean map so zero-fit
  // days still have an x value; all other dimensions derive from the per-fit records.
